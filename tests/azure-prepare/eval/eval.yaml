# Vally eval specification for azure-prepare skill
# Tests composable template selection, plan-first workflow, and IaC generation quality
#
# Run:  vally eval -e tests/azure-prepare/eval/eval.yaml --work-dir tests/azure-prepare/eval/fixtures -v
name: azure-prepare-eval
description: |
  Evaluation suite for the azure-prepare skill.
  Tests across dimensions:
  - Template selection accuracy (HTTP base, Cosmos DB, Service Bus, Timer, Durable)
  - Plan-first workflow compliance (creates .azure/deployment-plan.md before code)
  - IaC generation quality (Bicep and Terraform)
  - Language coverage (C#, TypeScript, Python, Java, PowerShell)
  - Security posture (managed identity, RBAC, no connection strings)

skill: azure-prepare
version: "1.0"

config:
  runs: 3
  timeout: "10m"
  executor: mock
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8
  weights:
    completed: 1.0
    output-matches: 0.5
    output-not-matches: 2.0

graders:
  - type: completed
  - type: output-matches
    name: plan_first
    config:
      pattern: "(?i)plan|planning|structure|step|phase|first|will create|creating"
  - type: output-not-matches
    name: no_runtime_failure
    config:
      pattern: "(?i)fatal error|crashed|exception occurred"
  - type: output-not-matches
    name: security_posture
    config:
      pattern: "(?i)connection.?string.*=.*Account(Key|Name)=|SharedAccessKey="
tasks:
  - "tasks/*.yaml"
