# Test azure-deploy deployment tests
#
# Runs the deployment test groups for azure-deploy skill.
# Triggered manually.

name: Integration Tests - azure-deploy

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      model-override:
        description: 'Model to use for testing'
        required: false
        type: choice
        options:
          - claude-sonnet-4.6
          - claude-opus-4.6
      test-pattern:
        description: 'Optional: Comma separated patterns by name or describe block (e.g. "creates todo list", "vanilla-static-web-apps-deploy", "Terraform"). If empty, all tests will be run.'
        required: false
        type: string
        default: ''
      debug:
        description: 'Whether to set DEBUG=1 for jest tests'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      model-override:
        description: 'Model to use for testing'
        required: false
        type: string
      test-pattern:
        description: 'Optional: Comma delimited tests by name or describe block'
        required: false
        type: string
        default: ''
      debug:
        description: 'Whether to set DEBUG=1 for jest tests'
        required: false
        type: boolean
        default: false
    secrets:
      COPILOT_CLI_TOKEN:
        required: true

jobs:
  setup:
    name: Build test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Parse test-pattern input into matrix
        id: set-matrix
        env:
          INPUT: ${{ inputs.test-pattern }}
        run: |
          # Default test groups if input is empty
          DEFAULT='["skill-invocation","vanilla-static-web-apps-deploy","vanilla-app-service-deploy","vanilla-azure-functions-deploy","vanilla-azure-container-apps-deploy","terraform-static-web-apps-deploy","terraform-app-service-deploy","terraform-azure-functions-deploy","terraform-azure-container-apps-deploy","brownfield-dotnet","brownfield-javascript","brownfield-python"]'
          
          if [ -z "$INPUT" ]; then
            echo "matrix=$DEFAULT" >> "$GITHUB_OUTPUT"
          else
            # Convert comma-delimited input to JSON array
            JSON=$(echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -sc .)
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: azure-deploy – ${{ matrix.test-group }}
    needs: setup
    environment: cideploytest
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        test-group: ${{ fromJson(needs.setup.outputs.matrix) }}
    defaults:
      run:
        working-directory: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install azd
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2

      - name: Setup terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4

      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      
      # azure/login only fetches the OIDC access token once.
      # If a test starts after the token expires, it will fail with authentication errors.
      # This step runs code to refresh the cached OIDC access token periodically to ensure all tests have a valid access token.
      # Learn more at https://github.com/Azure/login/issues/372
      # Refresh interval is sub-5-minutes because the OIDC token's lifetime is
      # 5 minutes. Using 240s avoids seeing invalid tokens due to clock skew.
      - name: Fetch OIDC token every 240 seconds
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: |
          while true; do
            token=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq .value -r)
            az login --service-principal -u $AZURE_CLIENT_ID -t $AZURE_TENANT_ID --federated-token $token --output none
            sleep 240
          done &

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: |
          npm install --no-save @playwright/mcp@0.0.71
          npx playwright install --with-deps chromium

      - name: Build plugin output
        run: |
          cd ..
          npm ci --ignore-scripts
          npm run build
      
      # COPILOT_CLI_TOKEN must be a fine-grained access token with the Account level Copilot Request permission
      # saved to the secrets of the microsoft/GitHub-Copilot-for-Azure repo.
      # As a known issue, when the permission of the token doesn't grant sufficient access,
      # the agent will hang instead of giving an error.
      # If you see the agent hang indefinitely, try refreshing the access token.
      # See https://github.com/github/copilot-sdk/issues/343 for more details.
      - name: Setup Copilot CLI
        id: setup-copilot-cli
        uses: mvkaran/setup-copilot-cli@d05a47209e6b3185c9c55702bef49f28e6eebef7 # v1
        with:
          token: ${{ secrets.COPILOT_CLI_TOKEN }}

      - name: Run tests – ${{ matrix.test-group }}
        env:
          GH_HEAD_SHA: ${{ github.sha }}
          TEST_RUN_ID: azure-deploy
          DEBUG: ${{ inputs.debug && '1' || '' }}
          MODEL_OVERRIDE: ${{ inputs.model-override }}
          TEST_GROUP: ${{ matrix.test-group }}
        run: |
          echo test with $MODEL_OVERRIDE
          npm run test:integration -- azure-deploy "$TEST_GROUP"
        continue-on-error: true

      - name: Generate report
        if: always()
        id: generate-report
        run: npm run report -- --skill azure-deploy

      - name: Show skill report
        if: always()
        id: show-skill-report
        run: |
          SKILL_REPORT=$(find reports -name "*-SKILL-REPORT.md" -type f | head -n 1)
          if [ -n "$SKILL_REPORT" ]; then
            echo "Found skill report: $SKILL_REPORT"
            cat "$SKILL_REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No skill report found"
          fi

      - name: Export report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: azure-deploy-${{ matrix.test-group }}-reports
          path: tests/reports/
          retention-days: 30

      # Note: The managed identity must have write permission to the target storage account
      - name: Publish report to Azure Storage
        if: always() && github.event_name == 'schedule' && vars.REPORT_STORAGE_ACCOUNT != ''
        env:
          RUN_ID: ${{ github.run_id }}
          JOB_ID: ${{ github.job }}
          STORAGE_ACCOUNT: ${{ vars.REPORT_STORAGE_ACCOUNT }}
          STORAGE_CONTAINER: ${{ vars.REPORT_STORAGE_CONTAINER || 'integration-reports' }}
          TEST_GROUP: ${{ matrix.test-group }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          PREFIX="${DATE}/${RUN_ID}/azure-deploy/${TEST_GROUP}/"
          echo "Uploading reports to ${STORAGE_ACCOUNT}/${STORAGE_CONTAINER}/${PREFIX}"
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --destination "$STORAGE_CONTAINER" \
            --destination-path "$PREFIX" \
            --source reports/test-run-azure-deploy \
            --auth-mode login \
            --overwrite

      # Publish reports to the same storage account but a separate container for manual runs.
      # Note: The managed identity must have write permission to the target storage account.
      - name: Publish report to Azure Storage (manual run)
        if: always() && github.event_name == 'workflow_dispatch' && vars.REPORT_STORAGE_ACCOUNT != ''
        env:
          RUN_ID: ${{ github.run_id }}
          JOB_ID: ${{ github.job }}
          STORAGE_ACCOUNT: ${{ vars.REPORT_STORAGE_ACCOUNT }}
          STORAGE_CONTAINER: ${{ vars.MANUAL_REPORT_STORAGE_CONTAINER || 'manual-integration-reports' }}
          TEST_GROUP: ${{ matrix.test-group }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          PREFIX="${DATE}/${RUN_ID}/azure-deploy/${TEST_GROUP}/"
          echo "Uploading reports to ${STORAGE_ACCOUNT}/${STORAGE_CONTAINER}/${PREFIX}"
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --destination "$STORAGE_CONTAINER" \
            --destination-path "$PREFIX" \
            --source reports/test-run-azure-deploy \
            --auth-mode login \
            --overwrite

      # Upload per-test token usage to the Azure Table that powers the dashboard's
      # "token usage over time" page. Runs for both scheduled and manual runs.
      # Note: The managed identity must have Storage Table Data Contributor on the storage account.
      - name: Upload token usage to table
        if: always() && vars.REPORT_STORAGE_ACCOUNT != ''
        env:
          TOKEN_USAGE_STORAGE_ACCOUNT: ${{ vars.REPORT_STORAGE_ACCOUNT }}
          TOKEN_USAGE_TABLE_NAME: ${{ vars.TOKEN_USAGE_TABLE || 'integrationtokenusage' }}
          SKILL: azure-deploy
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: npm run upload:token-usage

      # Upload per-run tool usage (one row per tool call) to the Azure Table that
      # powers the dashboard's per-run tool review. Runs for both scheduled and manual runs.
      # Note: The managed identity must have Storage Table Data Contributor on the storage account.
      - name: Upload tool usage to table
        if: always() && vars.REPORT_STORAGE_ACCOUNT != ''
        env:
          TOOL_USAGE_STORAGE_ACCOUNT: ${{ vars.REPORT_STORAGE_ACCOUNT }}
          TOOL_USAGE_TABLE_NAME: ${{ vars.TOOL_USAGE_TABLE || 'integrationtoolusage' }}
          SKILL: azure-deploy
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: npm run upload:tool-usage
