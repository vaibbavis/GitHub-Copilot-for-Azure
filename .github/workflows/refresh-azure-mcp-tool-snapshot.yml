name: Refresh Azure MCP Tool Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: read
  issues: write

jobs:
  refresh-snapshot:
    runs-on: ubuntu-latest
    env:
      SNAPSHOT_PATH: tests/fixtures/azure-mcp-tool-names.snapshot.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Update Azure MCP tool snapshot
        working-directory: tests
        run: npm run update:mcp-tool-snapshot
        env:
          AZURE_MCP_TELEMETRY_OPTOUT: "true"
          DOTNET_CLI_TELEMETRY_OPTOUT: "true"
          AZURE_CORE_COLLECT_TELEMETRY: "0"

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if git diff --quiet -- "$SNAPSHOT_PATH"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue for snapshot update
        id: create_issue
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = 'chore: refresh Azure MCP tool snapshot';

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open "${title}" in:title`,
              per_page: 1,
            });

            if (existing.data.total_count > 0) {
              core.info(`Issue already exists: #${existing.data.items[0].number}`);
              return;
            }

            const body = [
              '## Summary',
              '- The `tests/fixtures/azure-mcp-tool-names.snapshot.json` file needs to be updated.',
              '- The scheduled `Refresh Azure MCP Tool Snapshot` workflow detected changes in the latest `@azure/mcp` CLI tool list.',
              '',
              '## Action Required',
              'Please run the following command and commit the changes:',
              '```bash',
              'cd tests && npm run update:mcp-tool-snapshot',
              '```',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });

            core.info(`Created issue #${issue.data.number}`);
            core.setOutput('issue-number', issue.data.number);

      - name: Assign issue to Copilot
        if: steps.create_issue.outputs.issue-number != ''
        env:
          GH_TOKEN: ${{ secrets.ASSIGN_ISSUE_TOKEN }}
        run: gh issue edit ${{ steps.create_issue.outputs.issue-number }} --add-assignee "@copilot"
