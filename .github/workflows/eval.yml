name: Run Skill Evaluations

on:
  pull_request:
    paths:
      - 'evals/**'
      - 'plugin/skills/**'
      - '.vally.yaml'
  schedule:
    - cron: '0 6 * * *' # Nightly at 06:00 UTC
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - triggers
          - integration
          - smoke

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install vally-cli
        run: npm install --no-save --ignore-scripts @microsoft/vally-cli@^0.4.0

      - name: Install dependencies
        run: npm install

      - name: Build skills
        run: npm run build

      - name: Lint skill and eval specs
        run: npx @microsoft/vally-cli lint plugin/skills/ --eval evals/ --strict

      - name: Determine suite
        if: github.event_name != 'pull_request'
        id: suite
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.suite || 'full' }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Run smoke evaluations
        if: github.event_name == 'pull_request'
        run: |
          npx @microsoft/vally-cli eval \
            --suite smoke \
            --runs 1 \
            --output-dir ./results \
            --output jsonl \
            --junit \
            --threshold 0.8 \
            --skill-dir output/skills
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Run evaluations
        if: github.event_name != 'pull_request'
        run: |
          npx @microsoft/vally-cli eval \
            --suite ${{ steps.suite.outputs.name }} \
            --output-dir ./results \
            --output jsonl \
            --junit \
            --threshold 0.8 \
            --skill-dir output/skills
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: eval-results
          path: results/
          retention-days: 30

