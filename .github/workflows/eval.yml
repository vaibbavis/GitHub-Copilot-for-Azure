name: Run Skill Evaluations

on:
  pull_request:
    paths:
      - "evals/**"
      - "plugin/skills/**"
      - ".vally.yaml"
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - triggers
          - integration
          - smoke

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Build skills
        run: npm run build

      - name: Validate stimuli metadata
        run: |
          cd scripts
          npm run vally validate-stimulus

      - name: Lint skill and eval specs
        run: npx --yes @microsoft/vally-cli@^0.7.0 lint plugin/skills/ --eval-spec evals/ --strict --grader-plugin ./tests/vally/vally-graders.ts

      - name: Determine suite
        if: github.event_name != 'pull_request'
        id: suite
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.suite || 'full' }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Run smoke evaluations
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        working-directory: tests
        run: |
          npm run test:vally -- \
            --suite smoke \
            --runs 1 \
            --output jsonl \
            --junit \
            --threshold 0.8
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Run evaluations
        if: github.event_name != 'pull_request'
        working-directory: tests
        run: |
          npm run test:vally -- \
            --suite ${{ steps.suite.outputs.name }} \
            --output jsonl \
            --junit \
            --threshold 0.8
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: eval-results
          path: tests/results/
          retention-days: 30
