name: Microsoft Foundry E2E Evaluations

on:
  workflow_dispatch:
    inputs:
      target_pr_id:
        description: "Target PR number (optional)"
        required: false
        type: string
      runs:
        description: "Number of Vally trials per stimulus"
        required: false
        default: 1
        type: number
      report-in-pr:
        description: "Post report to target PR"
        required: false
        default: true
        type: boolean

permissions: {}

jobs:
  eval:
    name: Run Microsoft Foundry E2E evals
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Override Microsoft Foundry skill from target PR head
        if: ${{ inputs.target_pr_id != '' }}
        shell: bash
        env:
          TARGET_PR_ID: ${{ inputs.target_pr_id }}
        run: |
          set -euo pipefail

          if [[ ! "${TARGET_PR_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::target_pr_id must be a pull request number."
            exit 1
          fi

          pr_head_ref="refs/remotes/origin/target-pr-${TARGET_PR_ID}-head"
          echo "Fetching PR #${TARGET_PR_ID} head from refs/pull/${TARGET_PR_ID}/head."
          git fetch --no-tags --depth=1 origin "+refs/pull/${TARGET_PR_ID}/head:${pr_head_ref}"
          rm -rf plugin/skills/microsoft-foundry
          git restore --source="${pr_head_ref}" --staged --worktree -- plugin/skills/microsoft-foundry

          echo "Using plugin/skills/microsoft-foundry from PR #${TARGET_PR_ID}:"
          git log -1 --oneline "${pr_head_ref}"
          git status --short plugin/skills/microsoft-foundry

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            scripts/package-lock.json
            tests/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2

      - name: Install azd AI agent extension
        run: azd extension install azure.ai.agents

      - name: Login to Azure using OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}

      # azure/login only fetches the OIDC access token once.
      # If the eval runs long enough and the token expires, later Azure CLI or azd calls can fail with authentication errors.
      # This refreshes the cached OIDC access token periodically so the long-running Foundry E2E eval has a valid token.
      # Learn more at https://github.com/Azure/login/issues/372
      # Refresh interval is sub-5-minutes because the OIDC token's lifetime is
      # 5 minutes. Using 240s avoids seeing invalid tokens due to clock skew.
      - name: Fetch OIDC token every 240 seconds
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_TENANT_ID }}
        run: |
          while true; do
            token=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq .value -r)
            az login --service-principal -u "$AZURE_CLIENT_ID" -t "$AZURE_TENANT_ID" --federated-token "$token" --output none
            sleep 240
          done &

      - name: Check Azure CLI login
        shell: bash
        run: |
          set -euo pipefail
          current_subscription="$(az account show --query id -o tsv)"
          test "$current_subscription" = "${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}"
          az account show --output table

      - name: Configure azd authentication
        shell: bash
        run: |
          set -euo pipefail
          azd config set auth.useAzCliAuth "true"
          azd config set defaults.subscription "${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}"

      - name: Install repository dependencies
        run: npm ci

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Build plugin output
        run: npm run build

      - name: Remove unrelated skills
        shell: bash
        run: |
          set -euo pipefail

          skills_dir="output/skills"
          if [[ ! -d "${skills_dir}/microsoft-foundry" ]]; then
            echo "::error::${skills_dir}/microsoft-foundry not found."
            exit 1
          fi

          find "${skills_dir}" -mindepth 1 -maxdepth 1 -type d ! -name "microsoft-foundry" -exec rm -rf -- {} +

      - name: Run Microsoft Foundry Vally evals
        working-directory: tests
        shell: bash
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          VALLY_RUNS: ${{ inputs.runs }}
          VALLY_RUNNER_DISABLE_AZURE_MCP: "true"
        run: |
          set -euo pipefail

          if [[ ! "${VALLY_RUNS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::runs must be a positive integer."
            exit 1
          fi

          npm run test:vally -- \
            --suite foundry-e2e \
            --runs "${VALLY_RUNS}" \
            --workers 1 \
            --junit \
            --threshold 0.8

      - name: Upload Vally results
        id: upload-vally-results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: microsoft-foundry-e2e-eval-results
          path: |
            tests/results/
            tests/reports/
          retention-days: 30

      - name: Install Copilot CLI
        if: always()
        shell: bash
        run: npm install -g @github/copilot

      - name: Generate Microsoft Foundry E2E eval report with Copilot CLI
        if: always()
        continue-on-error: true
        shell: bash
        env:
          ARTIFACT_URL: ${{ steps.upload-vally-results.outputs.artifact-url }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MODEL: 'claude-sonnet-4.6'
          COPILOT_PROMPT: tests/prompts/microsoft-foundry-e2e-eval-report.prompt.md
          REPORT_MD: ${{ runner.temp }}/microsoft-foundry-e2e-report/report.md
        run: copilot -C "${GITHUB_WORKSPACE}" --model "${COPILOT_MODEL}" --disable-builtin-mcps --no-custom-instructions --no-ask-user --allow-all-tools --secret-env-vars=COPILOT_GITHUB_TOKEN --no-color --silent -p "$(cat "${COPILOT_PROMPT}")"

      - name: Publish Microsoft Foundry E2E eval report
        id: publish-e2e-report
        if: always()
        shell: bash
        env:
          REPORT_MD: ${{ runner.temp }}/microsoft-foundry-e2e-report/report.md
        run: |
          set -euo pipefail

          if [[ -z "${REPORT_MD}" ]]; then
            REPORT_MD="${RUNNER_TEMP}/microsoft-foundry-e2e-report/report.md"
          fi

          mkdir -p "$(dirname "${REPORT_MD}")"

          if [[ ! -s "${REPORT_MD}" ]]; then
            echo "# Microsoft Foundry E2E Evaluation Report" > "${REPORT_MD}"
            echo >> "${REPORT_MD}"
            echo "Report generation did not produce output." >> "${REPORT_MD}"
          fi

          cat "${REPORT_MD}"
          cat "${REPORT_MD}" >> "${GITHUB_STEP_SUMMARY}"
          echo "report_md=${REPORT_MD}" >> "${GITHUB_OUTPUT}"

      - name: Comment Microsoft Foundry E2E eval results on PR
        if: ${{ always() && inputs.target_pr_id != '' && inputs['report-in-pr'] }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          TARGET_PR_ID: ${{ inputs.target_pr_id }}
          REPORT_MD: ${{ steps.publish-e2e-report.outputs.report_md }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const fs = require('fs');

            const targetPrId = (process.env.TARGET_PR_ID ?? '').trim();
            if (!/^[0-9]+$/.test(targetPrId)) {
              throw new Error(`target_pr_id must be a pull request number; got ${targetPrId}.`);
            }

            const serverUrl = process.env.GITHUB_SERVER_URL || 'https://github.com';
            const runUrl = `${serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const reportPath = (process.env.REPORT_MD ?? '').trim();
            const jobStatus = (process.env.JOB_STATUS ?? 'unknown').trim();
            let report = 'Microsoft Foundry E2E eval report was not generated.';

            if (reportPath && fs.existsSync(reportPath)) {
              report = fs.readFileSync(reportPath, 'utf8').trim();
            }

            const maxReportLength = 50000;
            if (report.length > maxReportLength) {
              report = `${report.slice(0, maxReportLength)}\n\n...truncated. See the workflow run or artifact for the full eval report.`;
            }

            const lines = [
              `Microsoft Foundry E2E eval finished for PR #${targetPrId}.`,
              '',
              `Workflow run: ${runUrl}`,
              `Job status: ${jobStatus}`,
            ];
            lines.push('', report);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(targetPrId),
              body: lines.join('\n'),
            });
