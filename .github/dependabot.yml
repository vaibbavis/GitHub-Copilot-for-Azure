version: 2
updates:
  # npm ecosystem — root package.json
  - package-ecosystem: npm
    directory: /
    groups:
      minor:
        update-types:
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
    open-pull-requests-limit: 10

    schedule:
      day: monday
      interval: weekly
  # npm ecosystem — scripts/
  - package-ecosystem: npm
    directory: /scripts
    groups:
      minor:
        update-types:
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
    open-pull-requests-limit: 5

    schedule:
      day: monday
      interval: weekly
  # npm ecosystem — tests/
  - package-ecosystem: npm
    directory: /tests
    groups:
      minor:
        update-types:
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
    open-pull-requests-limit: 5

    schedule:
      day: monday
      interval: weekly
  - directory: /
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-patch
      - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
    open-pull-requests-limit: 10
    package-ecosystem: github-actions
    schedule:
      day: monday
      interval: weekly
