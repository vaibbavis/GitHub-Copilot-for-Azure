updates:
- directory: /
  groups:
    minor:
      update-types:
      - minor
  ignore:
  - dependency-name: "*"
    update-types:
    - version-update:semver-patch
  - dependency-name: "@types/node" # @types/node versions mirror Node.js versions; pin manually
  open-pull-requests-limit: 10
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
- directory: /scripts
  groups:
    minor:
      update-types:
      - minor
  ignore:
  - dependency-name: "*"
    update-types:
    - version-update:semver-patch
  - dependency-name: "@types/node" # @types/node versions mirror Node.js versions; pin manually
  open-pull-requests-limit: 5
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
- directory: /tests
  groups:
    minor:
      update-types:
      - minor
  ignore:
  - dependency-name: "*"
    update-types:
    - version-update:semver-patch
  - dependency-name: "@types/node" # @types/node versions mirror Node.js versions; pin manually
  open-pull-requests-limit: 5
  package-ecosystem: npm
  schedule:
    day: monday
    interval: weekly
- directory: /
  ignore:
  - dependency-name: "*"
    update-types:
    - version-update:semver-patch
  - dependency-name: "github/gh-aw-actions/**"
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  open-pull-requests-limit: 10
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
- directories:
  - "/evals/**"
  ignore:
  - dependency-name: "*" # evals/ contains test fixtures only; suppress all dependency updates
  open-pull-requests-limit: 0
  package-ecosystem: pip
  schedule:
    interval: weekly
- directories:
  - "/evals/**"
  ignore:
  - dependency-name: "*" # evals/ contains test fixtures only; suppress all dependency updates
  open-pull-requests-limit: 0
  package-ecosystem: npm
  schedule:
    interval: weekly
version: 2
