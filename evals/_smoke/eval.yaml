name: azure-app-onboard-smoke
description: Single lightweight routing stimulus to smoke-test the Vally harness.

tags:
  type: integration
  skill: azure-app-onboard

config:
  runs: 1
  timeout: "5m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  - name: "Smoke - Proceeds With Defaults On Vague Input"
    prompt: "Onboard my app to Azure and just go with sensible defaults — help me get started."
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: output
      skill: azure-app-onboard
    constraints:
      max_turns: 6
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      - type: output-matches
        config:
          pattern: "(?i)deploy|app|host|azure|help|build|what.*want"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
      - type: completed
