  # ═══════════════════════════════════════════
  # Response quality tests
  # ═══════════════════════════════════════════

  # ── forecast-keywords-quality ──
  # Jest: "response contains forecast-related keywords"
  # Assertions: assistant output mentions "forecast", "projected", or "estimate"
  - name: "Forecast response contains relevant keywords"
    prompt: "What will my Azure costs be next month?"
    config:
      runs: 1
    tags:
      type: integration
      tier: full
      cost: llm
      area: response-quality
    graders:
      - type: output-matches
        config:
          pattern: "(?i)forecast|projected|estimate"
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── aks-cost-analysis-addon-quality ──
  # Jest: "response mentions cost analysis add-on for AKS namespace cost prompt"
  # Assertions: assistant output mentions "--enable-cost-analysis", "costAnalysis", or "Cost Analysis"
  - name: "AKS namespace cost mentions cost analysis add-on"
    prompt: "How do I enable namespace-level cost visibility for my AKS cluster?"
    config:
      runs: 1
    tags:
      type: integration
      tier: full
      cost: llm
      area: response-quality
    graders:
      - type: output-matches
        config:
          pattern: "(?i)--enable-cost-analysis|costAnalysis|cost\\s*analysis"
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── aks-monitoring-commands-quality ──
  # Jest: "response mentions monitoring commands for AKS cost anomaly prompt"
  # Assertions: assistant output mentions "kubectl top", "az monitor metrics", or "az consumption budget"
  - name: "AKS cost anomaly mentions monitoring commands"
    prompt: "What monitoring commands should I run to investigate a cost spike on an AKS cluster?"
    config:
      runs: 1
    tags:
      type: integration
      tier: full
      cost: llm
      area: response-quality
    graders:
      - type: output-matches
        config:
          pattern: "(?i)kubectl top|az monitor metrics|az consumption budget"
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── storage-lifecycle-policy-quality ──
  # Assertions: assistant output mentions lifecycle policy concepts
  - name: "Storage optimization mentions lifecycle policies and tiers"
    prompt: "How can I optimize costs on my Azure storage accounts that have data sitting in hot tier for months?"
    config:
      runs: 1
    tags:
      type: integration
      tier: full
      cost: llm
      area: response-quality
    graders:
      - type: output-matches
        config:
          pattern: "(?i)lifecycle|cool|archive|tiering|access tier"
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
