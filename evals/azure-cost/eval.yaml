  # ── aks-cost-anomaly-investigation-prompt ──
  # Jest: "invokes skill for AKS cost anomaly investigation prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  # Note: original Jest test used shouldEarlyTerminateForSkillInvocation
  - name: "AKS cost spike investigation"
    prompt: "My AKS cluster costs spiked unexpectedly last Sunday from 2am to 4pm EST, help me investigate"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-cost"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
