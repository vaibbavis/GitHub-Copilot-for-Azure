# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-cost/integration.test.ts
# Migration: Jest → Vally
#
# Global graders (evaluate#125 workaround): no_runtime_failure
# is duplicated into every stimulus block below.
#
# Note on runs:
# - Routing stimuli preserve the original Jest invocation-rate behavior (3 runs, 80% threshold).
# - Response-quality stimuli were single-run tests in Jest. Each quality stimulus includes
#   a stimulus-level `config.runs: 1` annotation.
# - Stimuli with earlyTerminate tags must NOT use the `completed` grader.

name: azure-cost-integration-eval
description: |
  Integration evaluation for azure-cost skill — migrated from Jest integration tests.
  Tests skill routing for cost query, cost forecast, cost optimization, and AKS cost prompts
  using invocation rate measurement (3 runs, 80% threshold), plus response quality checks
  for forecast keywords, AKS cost analysis add-on, and monitoring commands.

tags:
  type: integration
  skill: azure-cost

config:
  runs: 3
  timeout: "10m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ═══════════════════════════════════════════
  # Cost Query routing prompts
  # ═══════════════════════════════════════════

  # ── monthly-cost-prompt ──
  # Jest: "invokes skill for monthly cost prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Monthly Azure cost query"
    prompt: "What are my Azure costs this month?"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-cost"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-cost
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── cost-breakdown-prompt ──
  # Jest: "invokes skill for cost breakdown prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Cost breakdown by service"
    prompt: "Show me cost breakdown by service for my subscription"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-cost"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-cost
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── resource-group-cost-query ──
