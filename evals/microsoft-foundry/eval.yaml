# Vally eval config — migrated from Jest integration tests
# Source: tests/microsoft-foundry/integration.test.ts
# Migration: Jest → Vally (Batch 1 — Simple)
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.

name: microsoft-foundry-integration-eval
description: |
  Integration evaluation for microsoft-foundry skill — migrated from Jest integration tests.
  Tests skill routing for Foundry model deployment, RAG apps, RBAC, CI/CD,
  managed identity, agent lifecycle, and dataset operations
  using invocation rate measurement (5 runs, 80% threshold).

tags:
  type: integration
  skill: microsoft-foundry

environment:
  skills:
    - ../../plugin/skills/microsoft-foundry

config:
  runs: 5
  timeout: "10m"
  executor: copilot-sdk
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── ai-model-deployment-prompt ──
  # Jest: "invokes microsoft-foundry skill for AI model deployment prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "AI model deployment from Foundry catalog"
    prompt: "How do I deploy an AI model from the Microsoft Foundry catalog?"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── rag-application-prompt ──
  # Jest: "invokes microsoft-foundry skill for RAG application prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "RAG application with knowledge indexes"
    prompt: "Build a RAG application with Microsoft Foundry using knowledge indexes"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
