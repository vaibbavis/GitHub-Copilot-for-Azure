# Vally e2e eval suite for azure-prepare
# Source: tests/azure-prepare/integration.test.ts
# Covers: prepare-deployment, aspire-brownfield, entra-sql-auth,
#         durable-task-scheduler, and functions-template-mcp suites.
#
# These tests let the agent run to file generation and check workspace outputs.
# earlyTerminate stops runs before actual Azure provisioning (azd up/validate).
# NOTE: earlyTerminate tests must NOT use the `completed` grader.
#
# Grader limitations vs Jest originals:
#  - functions_template_get tool-call count: not expressible without a custom
#    grader; approximated via file-matches on generated code content.
#  - administratorLoginPassword absence in Bicep: no file-not-matches grader;
#    approximated via output-not-matches (agent shouldn't mention it in output).

name: azure-prepare-e2e-eval
description: |
  End-to-end evaluation suite for the azure-prepare skill.
  Tests file generation quality and correctness across:
  - IaC recipe selection (AZD+Bicep, Terraform, standalone Bicep)
  - .NET Aspire brownfield (azure.yaml services section)
  - Entra-only SQL authentication (no admin password in Bicep)
  - Durable Task Scheduler infrastructure
  - Azure Functions MCP template usage (14 trigger types, Python + TypeScript)

tags:
  type: integration
  skill: azure-prepare

defaults:
  runs: 1
  timeout: "30m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

stimuli:

  # ═══════════════════════════════════════════
  # prepare-deployment
  # Source: describe("prepare-deployment")
  # ═══════════════════════════════════════════

  # Jest: "creates project files for static whiteboard web app before validation"
  - name: "Whiteboard App Plan Ready"
    prompt: "Create a static whiteboard web app and deploy it to Azure using azd."
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: output
      skill: azure-prepare
      systemPrompt: '{"mode":"append","content":"Skip the Provisioning Limit Checklist (Step 6 in the plan template). Use reasonable default values for quota/limit columns instead of running az quota commands or invoking the azure-quotas skill. Focus your effort on generating the infrastructure and application files."}'
      earlyTerminate: '[{"type":"skill-call","skill":"azure-validate"},{"type":"tool-call-count","count":40}]'
      followUp:
        - "Continue with recommended options until complete."
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-prepare
      - type: file-exists
        config:
          path: "**/deployment-plan.md"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # Jest: "creates correct files for AZD with Bicep recipe"
  - name: "AZD Bicep Recipe"
    prompt: "Create a simple todo web app and deploy it to Azure using azd."
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
      skill: azure-prepare
      systemPrompt: '{"mode":"append","content":"Skip the Provisioning Limit Checklist (Step 6 in the plan template). Use reasonable default values for quota/limit columns instead of running az quota commands or invoking the azure-quotas skill. Focus your effort on generating the infrastructure and application files."}'
      earlyTerminate: '[{"type":"skill-call","skill":"azure-validate"},{"type":"tool-call-count","count":40}]'
      followUp:
        - "Continue with recommended options until complete."
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-prepare
      - type: file-exists
        config:
          path: "**/deployment-plan.md"
      - type: file-exists
        config:
          path: "**/azure.yaml"
      - type: file-exists
        config:
          path: "**/*.bicep"
      - type: file-not-exists
        config:
          path: "**/*.tf"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

