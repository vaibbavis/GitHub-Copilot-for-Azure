          path: "**/*.py"
          pattern: "app\\.(route|function_name)|@app\\.route|func\\.FunctionApp"
      - type: file-exists
        config:
          path: "**/*.bicep"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

