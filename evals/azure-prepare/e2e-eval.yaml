    tags:
      type: integration
      tier: full
      cost: llm
      area: output
      skill: azure-prepare
      earlyTerminate: '[{"type":"skill-call","skill":"azure-validate"},{"type":"tool-call-count","count":40}]'
      followUp:
        - "Continue with recommended options until complete."
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-prepare
      - type: file-exists
        config:
          path: "**/deployment-plan.md"
      - type: file-exists
        config:
          path: "**/azure.yaml"
      - type: file-exists
        config:
          path: "**/*.bicep"
      - type: file-matches
        config:
          path: "**/*.bicep"
          pattern: "Microsoft\\.DurableTask/schedulers"
      - type: file-matches
        config:
          path: "**/*.bicep"
          pattern: "Microsoft\\.DurableTask/schedulers/taskHubs"
      # DTS Contributor role definition ID
      - type: file-matches
        config:
          path: "**/*.bicep"
          pattern: "0ad04412-c4d5-4796-b79c-f76d14c8d402"
      - type: file-matches
        config:
          path: "**/*.bicep"
          pattern: "(?i)ipAllowlist"
      - type: file-matches
        config:
          path: "**/*"
          pattern: "DURABLE_TASK_SCHEDULER_CONNECTION_STRING"
      - type: file-not-exists
        config:
          path: "**/*.tf"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

