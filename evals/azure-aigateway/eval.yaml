# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-aigateway/integration.test.ts
# Migration: Jest → Vally (Batch 1 — Simple)
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.

name: azure-aigateway-integration-eval
description: |
  Integration evaluation for azure-aigateway skill — migrated from Jest integration tests.
  Tests skill routing for API Management AI Gateway scenarios: setup, rate limiting,
  semantic caching, content safety, load balancing, MCP governance, and backend config
  using invocation rate measurement (5 runs, 80% threshold).

tags:
  type: integration
  skill: azure-aigateway

defaults:
  runs: 5
  timeout: "10m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── apim-gateway-setup-prompt ──
  # Jest: "invokes azure-aigateway skill for API Management gateway prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "APIM AI Gateway setup for OpenAI"
    prompt: "How do I set up Azure API Management as an AI Gateway for my Azure OpenAI models?"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-aigateway"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-aigateway
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── rate-limiting-prompt ──
  # Jest: "invokes azure-aigateway skill for rate limiting prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Rate limiting and token limits for AI requests"
    prompt: "How do I add rate limiting and token limits to my AI model requests using APIM?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-aigateway"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-aigateway
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── semantic-caching-prompt ──
  # Jest: "invokes azure-aigateway skill for semantic caching prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Semantic caching for OpenAI cost reduction"
    prompt: "Enable semantic caching for my Azure OpenAI API to reduce costs"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-aigateway"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-aigateway
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── content-safety-prompt ──
  # Jest: "invokes azure-aigateway skill for content safety prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Content safety and jailbreak detection"
    prompt: "Add content safety and jailbreak detection to my AI gateway endpoint"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-aigateway"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-aigateway
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── load-balancing-prompt ──
