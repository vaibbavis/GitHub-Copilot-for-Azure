# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-app-onboard-prereq/**/*.test.ts
# Migration goal: cover critical nightly paths for the prereq (repo-readiness) skill —
# routing/invocation, per-stack readiness evaluation, dependency compatibility,
# and negative/blocking behavior.
#
# Note on repo context:
# Code-context stimuli clone a real sample repo into the agent workspace via
# environment.commands, mirroring the JS integration tests' cloneRepo() setup.
# We use git init + fetch --depth 1 + checkout (rather than a bare `git clone`)
# so cloning is robust even when the workspace is pre-populated.
  # Repos: bya-simple-web-app (healthy Express), DockerStaticSite (Dockerfile+static),
  # postgresql-event-sourcing (Java/Spring+Kafka+Postgres),
  # bya-unsupported-web-app (AWS/DynamoDB, unsupported), bya-broken-web-app (missing module).

name: azure-app-onboard-prereq-eval
description: |
  Evaluation suite for the azure-app-onboard-prereq skill.
  Focuses on high-value nightly coverage migrated from JavaScript integration tests:
  - Skill routing/invocation for repo-readiness prompts
  - Per-stack readiness evaluation (Node, Docker, Java, Go)
  - Dependency compatibility assessment
  - Negative/blocking behavior for unsupported or broken repos

tags:
  type: integration
  skill: azure-app-onboard-prereq

config:
  runs: 1
  timeout: "12m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── integration-diversity.test.ts ──────────────────────────────────
  # test: e2e — postgresql-event-sourcing (Java/Spring Boot + Kafka)
  - name: "Dependency Compat - Java Spring Boot"
    prompt: "Can you check if my dependencies are compatible with Azure?"
    tags:
      type: integration
      tier: full
      area: output
      skill: azure-app-onboard-prereq
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/eugene-khyst/postgresql-event-sourcing
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 16
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard-prereq"]
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prereq-output.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/readiness-report.md"
      - type: output-matches
        config:
          pattern: "(?i)java|spring|gradle"
      - type: output-matches
        config:
          pattern: "(?i)postgres|kafka|event hub|database"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
      - type: completed

