      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"path\":\"[^\"]*scaffold-manifest\\.json\""},{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"path\":\"[^\"]*\\.bicep\""},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"az\\s+deployment\\s+(sub|group)\\s+create|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/nishanttotla/DockerStaticSite
        - git fetch -q --depth 1 origin master
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
