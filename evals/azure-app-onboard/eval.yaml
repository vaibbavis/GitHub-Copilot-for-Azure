  # test: zip creation with correct directory structure
  # Faithful to Jest: earlyTerminate when a zip/compress/publish command appears.
  # Bans the Compress-Archive misuse that flattens the directory structure.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy - Zip Creation Directory Structure"
    prompt: "I'm new to Azure. Can you get my existing app running without me setting up infrastructure?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"Compress-Archive|System\\.IO\\.Compression|zip|az\\s+webapp\\s+deploy|az\\s+webapp.*publish"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/dev-arv13/demo-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # must NOT flatten the directory structure via Compress-Archive .FullName
      - type: tool-calls
        config:
