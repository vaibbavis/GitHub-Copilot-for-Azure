# Nightly evaluation suite for the azure-app-onboard skill — the full aggregate of the per-phase
# suites (routing, planning/prepare, scaffold, deploy) plus safety/negative coverage.
#
# Reviewer notes:
#   • Code-context stimuli clone a real sample repo into the workspace via environment.commands
#     (git init + fetch --depth 1 + checkout, so it works even if the workspace is pre-populated).
#     Repos used include: bya-simple-web-app (healthy Express), microblog-ai-remix (existing IaC),
#     bya-unsupported-web-app (unsupported stack), bya-broken-web-app (broken), and
#     aws-samples/aws-bookstore-demo-app (AWS migration).
#   • Most stimuli stop before real provisioning via `earlyTerminate` (cost: llm+execute). The
#     `Deploy Verify` and `Fast Track` stimuli are cost: azure and provision real resources.
name: azure-app-onboard-eval
description: |
  Evaluation suite for the azure-app-onboard skill.
  Focuses on high-value nightly coverage across:
  - Skill routing for onboarding prompts
  - Existing-repo planning and architecture guidance
  - Representative deployment guidance and safety constraints
  - Negative/blocking behavior for unsupported or broken scenarios

tags:
  type: integration
  skill: azure-app-onboard

config:
  runs: 1
  timeout: "12m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

# Graders combine several checks: `output-matches` / `output-not-matches` on the assistant's
# replies, `file-exists` / `file-matches` on the session artifacts the skill writes under
# .copilot-azure/sessions/…, and `tool-calls` on the commands the agent actually ran.
stimuli:
  # ── Deploy: code to Container Apps (not just IaC) ──
  # test: e2e — wetty deploys code to Container Apps, not just IaC
  # 10-turn followUp (SUBSCRIPTION_PRIMER + 9 "Yes"), earlyTerminate on
  # ACR build / Bicep deploy / deploy-result.json write / terraform (bad path).
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy - Wetty Code To Container Apps"
    prompt: "I want to take my local app and put it in the cloud — where do I start?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-result","toolPattern":"bash|powershell","argsPattern":"az\\s+acr\\s+build(?![^\"]*\\|\\s*(started|succeeded|failed))"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"terraform\\s+(apply|init)"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/butlerx/wetty
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # Container Apps must be the target compute
      - type: output-matches
        config:
          pattern: "(?i)container.?apps"
      # Bicep must be used — not Terraform, not azd
      - type: output-matches
        config:
          pattern: "(?i)bicep|\\.bicep|az deployment (sub|group) create"
      # ACR build MUST have executed (code deploy, not just IaC);
      # Terraform and azd up/provision/deploy MUST NOT have executed
      - type: tool-calls
        config:
          required:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+acr\\s+build(?![^\"]*\\|\\s*(started|succeeded|failed))|docker\\s+(build|push)"
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)terraform\\s+(init|plan|apply)"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
      # Must NOT hand back manual "Next Steps" for code deploy instead of executing it
      - type: output-not-matches
        config:
          pattern: "(?i)next steps.{0,100}(docker build|docker push|deploy your code|az containerapp update)"
      # Bicep is the default IaC format — must NOT use Terraform
      - type: output-not-matches
        config:
          pattern: "(?i)terraform\\s+(init|plan|apply)|hashicorp/azurerm"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Deploy: App Service + Container Apps end-to-end ──
  # test: App Service deploy — safety, depth, imperative-CLI/Entra-auth, password
  # Fast-track format: NO earlyTerminate (runs to natural completion); file-matches for
  # schema checks (unaffected by the seeded fixture's second session dir). No `completed` grader.
  - name: "Deploy Verify - App Service Pipeline"
    prompt: "Use the azure-app-onboard skill to deploy my code to Azure."
    tags:
      type: integration
      tier: full
      cost: azure
      area: deployment
      debug: deploy-verify-appservice
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
    environment:
      commands:
        - git init -q
        - 'git remote add origin https://github.com/vaibbavis/GitHub-Copilot-for-Azure.git'
        - git fetch -q --depth 1 origin fixtures/deploy-app-service
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 200
    graders:
      # routing gate — azure-app-onboard MUST be invoked
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]

      # ── PREFLIGHT ORDERING: az account show (auth) BEFORE az deployment ──
      #
      - type: tool-calls
        config:
          sequence:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az account show"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az deployment (sub|group) create"

      # ── DEPLOY EXECUTED via Bicep IaC, not imperative/azd ──
      # shell-command-invoked strips heredoc/comment bodies before matching, so a banned command
      # that appears only as text (e.g. documented in a checklist) can't false-fail the guard.
      - type: shell-command-invoked
        config:
          required:
            - command: "(?i)az\\s+deployment\\s+(sub|group)\\b.*what-if"
              description: "what-if preview runs before deploy"
            - command: "(?i)az\\s+deployment\\s+(sub|group)\\s+create\\b"
              description: "Bicep deploy executed"
          disallowed:
            - command: "(?i)azd\\s+(up|provision|deploy)\\b"
              description: "no azd fallback"
            - command: "(?i)terraform\\s+(init|plan|apply)"
              description: "Bicep is default IaC — no Terraform"
            - command: "(?i)az\\s+(webapp|functionapp)\\s+update"
              description: "no imperative resource mutation (edit Bicep + redeploy)"
            - command: "(?i)az\\s+appservice\\s+plan\\s+update"
              description: "no imperative plan mutation"
            - command: "(?i)config-zip"
              description: "no config-zip (needs SCM basic auth; Entra-only)"

      # ── SCM basic-auth lifecycle: publishing credentials touched during code upload ──
      - type: shell-command-invoked
        config:
          required:
            - command: "(?i)basicpublishingcredentialspolicies"
              description: "SCM publishing-credential policy set during deploy"

      # ── PORTAL LINK surfaced to the user ──
      - type: output-matches
        config:
          pattern: "(?i)portal\\.azure\\.com"

      # ── LIVE ENDPOINT surfaced — proof of a real App Service deploy ──
      - type: output-matches
        config:
          pattern: "azurewebsites\\.net"

      # ── BICEP TAG retained through deploy ──
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "app-onboard-skill"

      # ── PHASE ARTIFACTS: every phase produced its output ──
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prereq-output.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prepare-plan.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-checklist.md"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deployment-summary.md"

      # ── NO azure.yaml — AppOnboard never generates it ──
      - type: file-not-exists
        config:
          path: "**/azure.yaml"

      # ── CONTEXT progression: deploy completed, currentPhase null ──
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
          pattern: '"completedPhases"\s*:\s*\[[^\]]*"deploy"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
          pattern: '"currentPhase"\s*:\s*null'

      # ── DEPLOY-RESULT SCHEMA: real deploy vs skeleton ──
      # required fields: status, subscriptionId, resourceGroupName, sessionId.
      # status MUST be "succeeded" — strongest single proof the deploy completed e2e.
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"status"\s*:\s*"succeeded"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"subscriptionId"\s*:\s*"[0-9a-f\-]{36}"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"resourceGroupName"\s*:\s*"[a-z][a-z0-9\-_]{2,}"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"sessionId"\s*:\s*"[0-9a-f\-]{36}"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"healthStatus"\s*:\s*"(healthy|degraded|unreachable|unknown)"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"endpoints"\s*:\s*\['
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"deploymentNames"\s*:\s*\['

      # ── PASSWORD SAFETY: never ask the user for a password ──
      - type: output-not-matches
        config:
          pattern: "(?i)(enter|provide|type|input)[^.\\n]{0,20}(password|passphrase|secret)"

      # ── Entra auth only — no Graph API calls ──
      - type: output-not-matches
        config:
          pattern: '(?i)graph\.microsoft\.com'

      # ── No manual "Next Steps" punt — agent must execute the deploy ──
      - type: output-not-matches
        config:
          pattern: "(?i)next steps.{0,100}(az webapp deploy|zip.*deploy|deploy your code)"

      # ── Bicep default IaC — no Terraform in output ──
      - type: output-not-matches
        config:
          pattern: "(?i)terraform\\s+(init|plan|apply)|hashicorp/azurerm"

      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: Container Apps deploy — depth + safety, managed identity, code deploy
  # Container Apps fixture; no earlyTerminate so `az acr build` completes and is counted.
  - name: "Deploy Verify - Container Apps Pipeline"
    prompt: "Use the azure-app-onboard skill to deploy my code to Azure."
    tags:
      type: integration
      tier: full
      cost: azure
      area: deployment
      debug: deploy-verify-containerapps
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
    environment:
      commands:
        - git init -q
        - 'git remote add origin https://github.com/vaibbavis/GitHub-Copilot-for-Azure.git'
        - git fetch -q --depth 1 origin fixtures/deploy-container-apps
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 200
    graders:
      # routing gate
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]

      # ── CODE DEPLOY EXECUTED: container image built/pushed + Bicep deploy ──
      # shell-command-invoked strips heredoc/comment bodies before matching.
      - type: shell-command-invoked
        config:
          required:
            - command: "(?i)az\\s+acr\\s+build\\b"
              description: "container image built + pushed"
            - command: "(?i)az\\s+deployment\\s+(sub|group)\\s+create\\b"
              description: "Bicep deploy executed"
          disallowed:
            - command: "(?i)azd\\s+(up|provision|deploy)\\b"
              description: "no azd fallback"
            - command: "(?i)terraform\\s+(init|plan|apply)"
              description: "Bicep is default IaC — no Terraform"
            - command: "(?i)az\\s+(containerapp|acr)\\s+update"
              description: "no imperative resource mutation"

      # ── PREFLIGHT ORDERING: az account show before az deployment ──
      - type: tool-calls
        config:
          sequence:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az account show"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az deployment (sub|group) create"

      # ── MANAGED IDENTITY: Container Apps IaC MUST use a managed identity ──
      #
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "(?i)systemassigned|userassigned|identity"

      # ── BICEP TAG retained through deploy ──
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "app-onboard-skill"

      # ── PHASE ARTIFACTS ──
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-checklist.md"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deployment-summary.md"

      # ── CONTEXT progression ──
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
          pattern: '"completedPhases"\s*:\s*\[[^\]]*"deploy"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
          pattern: '"currentPhase"\s*:\s*null'

      # ── DEPLOY-RESULT SCHEMA ──
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"status"\s*:\s*"succeeded"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"subscriptionId"\s*:\s*"[0-9a-f\-]{36}"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"resourceGroupName"\s*:\s*"[a-z][a-z0-9\-_]{2,}"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"sessionId"\s*:\s*"[0-9a-f\-]{36}"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"healthStatus"\s*:\s*"(healthy|degraded|unreachable|unknown)"'
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deploy-result.json"
          pattern: '"endpoints"\s*:\s*\['

      # ── LIVE ENDPOINT surfaced — Container Apps FQDN ──
      - type: output-matches
        config:
          pattern: "azurecontainerapps\\.io"

      # ── POST-DEPLOY HANDOFF: after the deploy completes, the skill hands off to the user ──
      # handoff content: deploy identity / cleanup commands / next-step recommendations / redeploy
      - type: output-matches
        config:
          pattern: "(?i)deployed by|signed in as|managed identity|service principal|subscription"
      - type: output-matches
        config:
          pattern: "(?i)az group delete|clean up|remove the resource|delete the resource|tear down"
      - type: output-matches
        config:
          pattern: "(?i)next step|recommend|consider|post-deploy|you should|suggestion"
      - type: output-matches
        config:
          pattern: "(?i)redeploy|re-deploy|deploy again|push code"
      # handoff artifact: deployment-summary.md contains the mandatory sections
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deployment-summary.md"
          pattern: "(?i)az group delete"
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/deployment-summary.md"
          pattern: "(?i)portal\\.azure\\.com"

      # ── No manual "Next Steps" for code deploy ──
      - type: output-not-matches
        config:
          pattern: "(?i)next steps.{0,100}(docker build|docker push|deploy your code|az containerapp update)"

      # ── Bicep default IaC — no Terraform in output ──
      - type: output-not-matches
        config:
          pattern: "(?i)terraform\\s+(init|plan|apply)|hashicorp/azurerm"

      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Deploy: result schema, audit log, healing loop ──
  # test: deploy writes audit log and deploy-result.json with correct schema
  # 4-turn followUp, earlyTerminate when deploy-result.json reaches a
  # terminal status. Checks deploy-result.json schema + audit log + phase artifacts.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy Depth - Audit Log And Result Schema"
    prompt: "I'm new to Azure. Can you get my existing app running without me setting up infrastructure?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults, cheapest option."
        - "Yes, proceed with scaffolding."
        - "Yes, deploy to Azure now."
        - "Yes, confirm the deployment."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed|in-progress)\""}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/samcdonald-ms/bya-simple-web-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # deploy-result.json must exist with the required schema fields
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "subscriptionId"
            - type: "has-property"
              key: "resourceGroupName"
            - type: "has-property"
              key: "sessionId"
      # deploy-audit.log must exist (incremental deploy log)
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-audit.log"
      # full phase progression artifacts
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prereq-output.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prepare-plan.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
      # context.json shows deploy in completedPhases
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
          pattern: '"completedPhases"\s*:\s*\[[^\]]*"deploy"'
      # must deploy via az deployment, NOT azd
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
      # must NOT generate azure.yaml
      - type: file-not-exists
        config:
          path: "**/azure.yaml"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: healing loop pauses for user after 3 failed attempts
  # 7-turn followUp injecting repeated quota failures; earlyTerminate
  # when deploy-result.json reaches a terminal status. Checks healingAttempts + user pause.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy Depth - Healing Loop Pauses After Retries"
    prompt: "I just signed up for Azure. What's the fastest way to bring my app over?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults."
        - "Yes, proceed."
        - "Deployment failed: The subscription does not have enough cores quota for 'Standard B1ms' in region 'eastus'. Required: 1, Available: 0."
        - "Try a different region."
        - "That also failed: Same quota error in westus2."
        - "Try another region."
        - "Still failing: Quota exhausted in centralus too."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed|in-progress)\""}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/samcdonald-ms/bya-simple-web-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # deploy-result.json records healing attempts
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "healingAttempts"
      # after repeated failures the agent pauses and asks the user for direction
      - type: output-matches
        config:
          pattern: "(?i)would you like|should i continue|should i|what would you|alternative|stop|suggestion|try that"
      # agent offers alternative regions or SKUs
      - type: output-matches
        config:
          pattern: "(?i)region|eastus2|westus|centralus|sku|tier|\\bb1\\b|\\bs1\\b|\\bp1\\b"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: deploy-result.json written even on deployment failure
  # 4-turn followUp injecting an authorization failure; earlyTerminate
  # when deploy-result.json reaches a terminal status. deploy-result.json ALWAYS written.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy Depth - Result Written On Failure"
    prompt: "I built a side project and want to get it live on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults."
        - "Yes, proceed."
        - "Deployment failed with: AuthorizationFailed — The client does not have authorization to perform action 'Microsoft.Resources/subscriptions/resourcegroups/write'."
        - "No, don't deploy. Stop here."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed|in-progress)\""}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/samcdonald-ms/bya-simple-web-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # deploy-result.json written even on failure, with required schema
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "subscriptionId"
