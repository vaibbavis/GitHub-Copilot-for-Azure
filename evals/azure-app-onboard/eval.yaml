# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-app-onboard/**/*.test.ts
# Migration goal: cover critical nightly paths for routing, planning/codegen guidance,
# deployment guidance, and safety/negative behavior.
#
# Note on existing-repo coverage:
# Code-context stimuli clone a real sample repo into the agent workspace via
# environment.commands, mirroring the JS integration tests' cloneRepo() setup.
# We use git init + fetch --depth 1 + checkout (rather than a bare `git clone`)
# so cloning is robust even when the workspace is pre-populated.
  # Repos: bya-simple-web-app (healthy Express), microblog-ai-remix (existing IaC),
  # bya-unsupported-web-app (unsupported stack), bya-broken-web-app (broken),
  # aws-samples/aws-bookstore-demo-app (AWS migration).
name: azure-app-onboard-eval
description: |
  Evaluation suite for the azure-app-onboard skill.
  Focuses on high-value nightly coverage migrated from JavaScript integration tests:
  - Skill routing for onboarding prompts
  - Existing-repo planning and architecture guidance
  - Representative deployment guidance and safety constraints
  - Negative/blocking behavior for unsupported or broken scenarios

tags:
  type: integration
  skill: azure-app-onboard

config:
  runs: 1
  timeout: "12m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

# Stimuli are ordered to mirror the prior Jest integration tests one-for-one,
# grouped by source file (alphabetical) and in-file test order. Every prior
# integration test has a corresponding stimulus below.
#
# Fidelity notes:
# - Vally graders are output/invocation-based only (no file-artifact assertions),
#   so seeded-fixture and artifact-schema tests (audit log, deploy-result.json,
#   zip structure, Bicep tags) are approximated via output-text patterns.
# - Seeded deploy fixtures in the JS suite are replaced here by cloning the closest
#   public sample repo and using the deploy-phase prompt; graders validate safe deploy 
#   behavior/output.
stimuli:
  # ── deploy/integration-container-apps.test.ts ──────────────────────
  # test: e2e — wetty deploys code to Container Apps, not just IaC
  # Faithful to Jest: 10-turn followUp (SUBSCRIPTION_PRIMER + 9 "Yes"), earlyTerminate on
  # ACR build / Bicep deploy / deploy-result.json write / terraform (bad path).
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy - Wetty Code To Container Apps"
    prompt: "I want to take my local app and put it in the cloud — where do I start?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"az\\s+acr\\s+build"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"terraform\\s+(apply|init)"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/butlerx/wetty
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # Container Apps must be the target compute
      - type: output-matches
        config:
          pattern: "(?i)container.?apps"
      # Bicep must be used — not Terraform, not azd
      - type: output-matches
        config:
          pattern: "(?i)bicep|\\.bicep|az deployment (sub|group) create"
      # ACR build MUST have executed (code deploy, not just IaC);
      # Terraform and azd up/provision/deploy MUST NOT have executed
      - type: tool-calls
        config:
          required:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+acr\\s+build|docker\\s+(build|push)"
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)terraform\\s+(init|plan|apply)"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
      # Must NOT hand back manual "Next Steps" for code deploy instead of executing it
      - type: output-not-matches
        config:
          pattern: "(?i)next steps.{0,100}(docker build|docker push|deploy your code|az containerapp update)"
      # Bicep is the default IaC format — must NOT use Terraform
      - type: output-not-matches
        config:
          pattern: "(?i)terraform\\s+(init|plan|apply)|hashicorp/azurerm"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── deploy/integration-deploy-verification.test.ts ─────────────────
  # test: App Service deploy — safety, depth, imperative-CLI/Entra-auth, password
  # Faithful to Jest: seeded deploy-ready fixture (fixtures/deploy-app-service),
  # DEPLOY_PHASE_FOLLOW_UPS (4 turns), earlyTerminate on pipeline complete
  # (deployment-summary.md written / deploy-result terminal). NO `completed` grader.
  # Fixture is intentionally fetched from the vaibbavis fork's fixtures/deploy-* branches.
  - name: "Deploy Verify - App Service Pipeline"
    prompt: "Use the azure-app-onboard skill to deploy my code to Azure."
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"path\":\"[^\"]*deployment-summary\\.md\""},{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed)\""}]'
    environment:
      commands:
        - git init -q
        - 'git remote add origin https://github.com/vaibbavis/GitHub-Copilot-for-Azure.git'
        - git fetch -q --depth 1 origin fixtures/deploy-app-service
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # deploy-result.json written with the required schema fields
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "subscriptionId"
            - type: "has-property"
              key: "resourceGroupName"
            - type: "has-property"
              key: "sessionId"
      # deployment summary + phase artifacts
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deployment-summary.md"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-checklist.md"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
          pattern: '"completedPhases"\s*:\s*\[[^\]]*"deploy"'
      # generated Bicep carries the app-onboard-skill tag
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "app-onboard-skill"
      # preflight ordering: az account show (auth) before az deployment
      - type: tool-calls
        config:
          sequence:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az account show"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az deployment (sub|group) create"
      # no imperative resource mutation / azd / config-zip
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+(webapp|functionapp)\\s+update|az\\s+appservice\\s+plan\\s+update"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)config-zip"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+(group|webapp|appservice)\\s+create"
      - type: output-not-matches
        config:
          pattern: '(?i)graph\.microsoft\.com'
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: Container Apps deploy — depth + safety (seeded fixture)
  # Faithful to Jest: seeded deploy-ready fixture (fixtures/deploy-container-apps),
  # DEPLOY_PHASE_FOLLOW_UPS (4 turns), earlyTerminate on ACR build / Bicep deploy /
  # deploy-result terminal / terraform. NO `completed` grader.
  - name: "Deploy Verify - Container Apps Pipeline"
    prompt: "Use the azure-app-onboard skill to deploy my code to Azure."
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"az\\s+acr\\s+build"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"az\\s+deployment\\s+(sub|group)\\s+create"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"terraform\\s+(apply|init)"},{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed)\""}]'
    environment:
      commands:
        - git init -q
        - 'git remote add origin https://github.com/vaibbavis/GitHub-Copilot-for-Azure.git'
        - git fetch -q --depth 1 origin fixtures/deploy-container-apps
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "subscriptionId"
            - type: "has-property"
              key: "resourceGroupName"
            - type: "has-property"
              key: "sessionId"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-checklist.md"
      # managed identity present in generated IaC
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "(?i)identity|managedidentity|systemassigned|userassigned"
      # app-onboard-skill tag present
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "app-onboard-skill"
      # ACR build executed; no terraform / azd / imperative create
      - type: tool-calls
        config:
          required:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+acr\\s+build|docker\\s+(build|push)"
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)terraform\\s+(init|plan|apply)"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+containerapp\\s+create"
      - type: output-not-matches
        config:
          pattern: "(?i)next steps.{0,100}(docker build|docker push|deploy your code|az containerapp update)"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── deploy/integration-depth.test.ts ───────────────────────────────
  # test: deploy writes audit log and deploy-result.json with correct schema
  # Faithful to Jest: 4-turn followUp, earlyTerminate when deploy-result.json reaches a
  # terminal status. Checks deploy-result.json schema + audit log + phase artifacts.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy Depth - Audit Log And Result Schema"
    prompt: "I'm new to Azure. Can you get my existing app running without me setting up infrastructure?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults, cheapest option."
        - "Yes, proceed with scaffolding."
        - "Yes, deploy to Azure now."
        - "Yes, confirm the deployment."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed|in-progress)\""}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/samcdonald-ms/bya-simple-web-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # deploy-result.json must exist with the required schema fields
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "subscriptionId"
            - type: "has-property"
              key: "resourceGroupName"
            - type: "has-property"
              key: "sessionId"
      # deploy-audit.log must exist (incremental deploy log)
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-audit.log"
      # full phase progression artifacts
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prereq-output.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prepare-plan.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
      # context.json shows deploy in completedPhases
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
          pattern: '"completedPhases"\s*:\s*\[[^\]]*"deploy"'
      # must deploy via az deployment, NOT azd
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
      # must NOT generate azure.yaml
      - type: file-not-exists
        config:
          path: "**/azure.yaml"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: healing loop pauses for user after 3 failed attempts
  # Faithful to Jest: 7-turn followUp injecting repeated quota failures; earlyTerminate
  # when deploy-result.json reaches a terminal status. Checks healingAttempts + user pause.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy Depth - Healing Loop Pauses After Retries"
    prompt: "I just signed up for Azure. What's the fastest way to bring my app over?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults."
        - "Yes, proceed."
        - "Deployment failed: The subscription does not have enough cores quota for 'Standard B1ms' in region 'eastus'. Required: 1, Available: 0."
        - "Try a different region."
        - "That also failed: Same quota error in westus2."
        - "Try another region."
        - "Still failing: Quota exhausted in centralus too."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed|in-progress)\""}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/samcdonald-ms/bya-simple-web-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # deploy-result.json records healing attempts
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "healingAttempts"
      # after repeated failures the agent pauses and asks the user for direction
      - type: output-matches
        config:
          pattern: "(?i)would you like|should i continue|should i|what would you|alternative|stop|suggestion|try that"
      # agent offers alternative regions or SKUs
      - type: output-matches
        config:
          pattern: "(?i)region|eastus2|westus|centralus|sku|tier|\\bb1\\b|\\bs1\\b|\\bp1\\b"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: deploy-result.json written even on deployment failure
  # Faithful to Jest: 4-turn followUp injecting an authorization failure; earlyTerminate
  # when deploy-result.json reaches a terminal status. deploy-result.json ALWAYS written.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy Depth - Result Written On Failure"
    prompt: "I built a side project and want to get it live on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults."
        - "Yes, proceed."
        - "Deployment failed with: AuthorizationFailed — The client does not have authorization to perform action 'Microsoft.Resources/subscriptions/resourcegroups/write'."
        - "No, don't deploy. Stop here."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"status\"\\s*:\\s*\"(succeeded|failed|in-progress)\""}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/samcdonald-ms/bya-simple-web-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # deploy-result.json written even on failure, with required schema
      - type: json-object-rules
        config:
          path: "**/.copilot-azure/sessions/*/deploy-result.json"
          rules:
            - type: "has-property"
              key: "status"
            - type: "has-property"
              key: "subscriptionId"
            - type: "has-property"
              key: "sessionId"
      # agent classifies the authorization error and suggests an RBAC fix
      - type: output-matches
        config:
          pattern: "(?i)authorizationfailed|authorization|not authorized|rbac|role assignment|az role assignment"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── deploy/integration-handoff.test.ts ─────────────────────────────
  # test: handoff presents cleanup, identity, and recommendations after deploy
  # Faithful to Jest: seeded deploy-ready fixture (fixtures/deploy-app-service),
  # DEPLOY_PHASE_FOLLOW_UPS (4 turns), earlyTerminate on handoff (deployment-summary.md
  # written). Checks handoff content + phase artifacts. NO `completed` grader.
  - name: "Deploy Handoff - Cleanup Identity Recommendations"
    prompt: "Use the azure-app-onboard skill to deploy my code to Azure."
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"path\":\"[^\"]*deployment-summary\\.md\""}]'
    environment:
      commands:
        - git init -q
        - 'git remote add origin https://github.com/vaibbavis/GitHub-Copilot-for-Azure.git'
        - git fetch -q --depth 1 origin fixtures/deploy-app-service
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deployment-summary.md"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/deploy-checklist.md"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/context.json"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prepare-plan.json"
      # handoff must present cleanup, identity, and recommendations
      - type: output-matches
        config:
          pattern: "(?i)az group delete|clean up|remove the resource|delete the resource|tear down"
      - type: output-matches
        config:
          pattern: "(?i)deployed by|signed in as|managed identity|service principal|subscription"
      - type: output-matches
        config:
          pattern: "(?i)next step|recommend|consider|post-deploy|you should|suggestion"
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── deploy/integration-safety.test.ts ──────────────────────────────
  # test: generated Bicep includes app-onboard-skill tag
  # Faithful to Jest: 5-turn followUp; earlyTerminate after scaffold (scaffold-manifest /
  # .bicep written, or a deploy command starts). Checks the app-onboard-skill Bicep tag.
  # NO `completed` grader — earlyTerminate is used.
