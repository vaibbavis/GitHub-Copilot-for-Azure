          required: ["azure-app-onboard"]
      # generated Bicep must carry the app-onboard-skill tag
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "app-onboard-skill"
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── deploy/integration.test.ts ─────────────────────────────────────
  # test: error classification routes back to scaffold fix
  # Faithful to Jest: seeds a broken Bicep (invalid API version 2024-99-01) in infra/,
  # drives to deploy with the JS 6-turn followUp; earlyTerminate once the agent proposes
  # a valid API version. NO `completed` grader — earlyTerminate is used.
  - name: "Deploy - Error Classification Routes To Scaffold Fix"
    prompt: "I have a prototype ready — help me get it to production on Azure."
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes, proceed."
        - "Yes, go ahead."
        - "Yes, continue."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"assistant-message-match","contentPattern":"20\\d{2}-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/samcdonald-ms/bya-simple-web-app
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
        - |
          mkdir -p infra
          cat > infra/main.bicep <<'BICEP'
          targetScope = 'resourceGroup'
          param location string = resourceGroup().location
          resource appServicePlan 'Microsoft.Web/serverfarms@2024-99-01' = {
            name: 'bya-plan'
            location: location
            sku: {
              name: 'F1'
              tier: 'Free'
            }
            kind: 'linux'
          }
          BICEP
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # identifies the bad API version / InvalidTemplate error
      - type: output-matches
        config:
          pattern: "(?i)api version|2024-99-01|invalidtemplate|not supported"
      # proposes a valid (well-formed) API version
      - type: output-matches
        config:
          pattern: "20\\d{2}-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: no imperative CLI fallback on auth error
  # Faithful to Jest: drives toward deploy on an env-blocked repo; earlyTerminate once
  # deploy output is produced. Bans imperative az-create + graph scope fallbacks.
  # NO `completed` grader — earlyTerminate is used.
  - name: "Deploy Safety - No Imperative CLI Fallback"
    prompt: "I built a side project and want to get it live on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: deployment
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"az\\s+deployment\\s+(sub|group)\\s+create"},{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"\"path\":\"[^\"]*deploy-result\\.json\""}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Arun07AK/broken-todo-demo
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # classifies env-blocking / conditional-access and offers a safe (Bicep) path
      - type: output-matches
        config:
          pattern: "(?i)environment|blocking|policy|conditional access|authenticat|alternative|safe|bicep|infrastructure"
      # no imperative resource creation
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+(group|webapp|appservice)\\s+create|az\\s+appservice\\s+plan\\s+create"
      # no graph scope fallback
      - type: output-not-matches
        config:
          pattern: '(?i)graph\.microsoft\.com'
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

