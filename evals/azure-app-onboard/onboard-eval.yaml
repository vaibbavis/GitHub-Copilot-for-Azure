      # Jest HARD: must NOT re-ask what the user already answered
      - type: output-not-matches
        config:
          pattern: "(?i)how many users|number of users|expected.*user.*count"
      - type: output-not-matches
        config:
          pattern: "(?i)what kind of (login|auth)|what type of (login|auth)|do you need.*(login|auth)"
