      # Jest: detection — blocking issues flagged
      - type: output-matches
        config:
          pattern: "(?i)missing|\\bfail\\b|broken|error|db\\.js|not found|crash|blocked"
      # Jest assertReEvaluationAfterFix (approximated — re-eval evidence in output)
      - type: output-matches
        config:
          pattern: "(?i)re-evaluat|re-scan|re-check|scan again|checking again|re-running|resolved|verified|0 remaining"
      # Jest HARD: Express detected
      - type: output-matches
        config:
          pattern: "(?i)\\bexpress\\b"
      # Jest HARD: App Service recommended post-fix
      - type: output-matches
        config:
          pattern: "(?i)app service"
