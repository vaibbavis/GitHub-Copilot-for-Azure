# ── onboard/*.test.ts — azure-app-onboard pipeline eval (invocation · negative · remediation ·
#    pipeline-flow · catalog) ──
# New format (see seeded-deploy-eval.yaml / integration-fast-track-vaibs.yaml): file/output/
# tool-call graders. earlyTerminate mirrors the Jest shouldEarlyTerminate* helpers and always OR's
# in a deploy-command condition as a safety net, so every stimulus halts BEFORE a real Azure deploy
# (cost: llm+execute, never cost: azure).
#
# NOT ported: assertNoSubagentFailures — its subagent.failed event path is dropped by the executor
# (a low-signal "nothing broke" negative check; the task-result-failure half is too weak to grade).
# assertPricingHandled and assertQuotaSubagentDispatched ARE ported on the catalog stimuli via their
# tool-call / output paths (MCP pricing tool, $/free-tier output, and `task` delegation — all survive
# the executor). Where a Jest check is SOFT (testComments.push, no expect()), it is omitted or kept
# lenient; only HARD expect() assertions become hard graders.
#   integration-invocation.test.ts (4) · integration-negative.test.ts (3) ·
#   integration-remediation.test.ts (1) · integration-pipeline-flow.test.ts (3) ·
#   integration-catalog.test.ts (3)

  # ═══════════════════════════════════════════════════════════════════════════
  # integration-invocation.test.ts — routing + first-turn depth (no real deploy)
  # ═══════════════════════════════════════════════════════════════════════════

  # test: invokes azure-app-onboard for startup MVP prompt (standalone, no workspace)
  - name: "Invocation - Startup MVP Standalone"
    prompt: "I'm a startup founder and need to deploy my MVP on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: routing
      debug: onboard-invocation-mvp
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"skill-call","skill":"azure-app-onboard"},{"type":"tool-call-count","count":15}]'
    constraints:
      max_turns: 40
    graders:
      # Jest HARD: invocation rate >= 0.5 (standalone prompts are flakier)
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

