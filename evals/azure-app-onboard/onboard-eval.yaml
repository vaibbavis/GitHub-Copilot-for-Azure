        config:
          pattern: "(?i)\\bcost\\b|pricing|\\$\\d"
      # Jest assertPricingHandled: real pricing produced (dollar amount / free-tier / monthly qualifier)
      # — covers the MCP-pricing + free-tier-shortcut paths; the sub-agent path also surfaces $ in output
      - type: output-matches
        config:
          pattern: "(?i)\\$\\s?\\d|\\$0|free[- ]?tier|per month|/month|monthly"
      # Jest assertQuotaSubagentDispatched: prepare delegates quota/pricing to a sub-agent. The
      # `task` tool call survives the executor (isSubagentDispatched path); a task fires by the gate.
      - type: tool-calls
        config:
          required:
            - name: "(?i)^task$"
      # Jest HARD: App Service or Container Apps recommended
      - type: output-matches
        config:
          pattern: "(?i)app service|container apps"
      # Jest HARD: database or auth dependency detected
      - type: output-matches
        config:
          pattern: "(?i)sqlite|database|\\bauth\\b|bcrypt|session|login"
      # Jest HARD (assertPhaseArtifactsExist): prereq artifact written
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/prereq-output.json"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: plan-quality — microblog-ai-remix (existing infra, must not overwrite)
  # NOTE: by design this routes to azure-app-onboard OR azure-prepare (azd-template-routing), so no
  # single-skill invocation gate — the graders assert existing-infra detection + no-overwrite.
  - name: "Catalog - Microblog Existing Infra Plan Quality"
    prompt: "I have a prototype ready — help me get it to production on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: catalog
      debug: onboard-catalog-microblog
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"assistant-message-match","contentPattern":"(?i)ready to proceed|ready to deploy\\?|shall i proceed"},{"type":"tool-call-result","toolPattern":"create|create_file|write_file|edit","argsPattern":"prepare-plan|scaffold-manifest"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"(?i)azd\\s+(up|provision)|az\\s+deployment|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/microblog-ai-remix
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 90
    graders:
      # Jest HARD: detects existing Azure infra (azure.yaml / Bicep / azd)
      - type: output-matches
        config:
          pattern: "(?i)azure\\.yaml|\\bbicep\\b|\\bazd\\b|existing infra"
      # Jest HARD (overwroteIaC === false): must NOT overwrite existing IaC
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(create_file|write_file)$"
              args:
                path: "(?i)main\\.bicep|main\\.tf|[\\\\/]infra[\\\\/]"
      # Jest HARD: Remix stack detected
      - type: output-matches
        config:
          pattern: "(?i)remix"
      # Jest HARD: NOT fast-tracked — asks a question OR analyzes components
      - type: output-matches
        config:
          pattern: "(?i)\\?|component|frontend|backend"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # test: plan-quality — full-stack-fastapi-template (React + FastAPI + PostgreSQL)
  - name: "Catalog - FastAPI Multi Component Plan Quality"
    prompt: "I'm a startup founder and need to deploy my MVP on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: catalog
      debug: onboard-catalog-fastapi
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"assistant-message-match","contentPattern":"(?i)ready to proceed|ready to deploy\\?|shall i proceed|edit plan"},{"type":"tool-call-match","toolPattern":"create|create_file|write_file|edit","argsPattern":"(?i)\\.bicep\\b|\\.tf\\b"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"(?i)azd\\s+(up|provision)|az\\s+deployment|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/fastapi/full-stack-fastapi-template
        - git fetch -q --depth 1 origin master
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 100
    graders:
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # Jest HARD: multi-component detected
      - type: output-matches
        config:
          pattern: "(?i)multiple|component|frontend|backend"
      # Jest HARD (>=2 stacks): React/TS/Vite ...
      - type: output-matches
        config:
          pattern: "(?i)react|typescript|vite"
      # ... AND FastAPI/Python
      - type: output-matches
        config:
          pattern: "(?i)fastapi|python"
      # Jest HARD: cost signal
      - type: output-matches
        config:
          pattern: "(?i)\\bcost\\b|pricing|\\$\\d"
      # Jest assertPricingHandled: real pricing produced (dollar amount / free-tier / monthly qualifier)
      # — covers the MCP-pricing + free-tier-shortcut paths; the sub-agent path also surfaces $ in output
      - type: output-matches
        config:
          pattern: "(?i)\\$\\s?\\d|\\$0|free[- ]?tier|per month|/month|monthly"
      # Jest assertQuotaSubagentDispatched: prepare delegates quota/pricing to a sub-agent. The
      # `task` tool call survives the executor (isSubagentDispatched path); a task fires by the gate.
      - type: tool-calls
        config:
          required:
            - name: "(?i)^task$"
      # Jest (assertDatabaseDetected postgresql): PostgreSQL → Azure equivalent
      - type: output-matches
        config:
          pattern: "(?i)postgres|flexible server"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
