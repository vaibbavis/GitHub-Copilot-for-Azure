      - type: output-matches
        config:
          pattern: "(?i)container apps|app service|static web apps|azure functions|\\bF1\\b|\\bB1\\b|\\bS1\\b|free|basic|standard|tier|sku"
      # per-service breakdown → >=2 dollar amounts + a monthly qualifier
      - type: output-matches
        config:
          pattern: "\\$\\d[\\s\\S]*\\$\\d"
      - type: output-matches
        config:
          pattern: "(?i)per month|/month|monthly"
