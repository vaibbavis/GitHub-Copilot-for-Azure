  # Jest: skillInvoked HARD · detectsExisting HARD · overwroteIaC=false HARD.
  - name: "Scaffold - Existing Azd Bicep No Overwrite"
    prompt: "I have a prototype ready — help me get it to production on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: scaffold
      debug: scaffold-existing-bicep
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Go with recommended options."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"assistant-message-match","contentPattern":"(?i)(?=[\\s\\S]*(azure\\.yaml|azd))(?=[\\s\\S]*(existing|found|detected))(?=[\\s\\S]*(deploy using|start fresh|use existing|create new|option|choice))"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"(?i)azd\\s+(up|provision)|az\\s+deployment|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/microblog-ai-remix
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 80
    graders:
      # routing gate (Jest HARD: isSkillInvoked === true)
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # Existing IaC detected (Jest HARD: detectsExisting)
      - type: output-matches
        config:
          pattern: "(?i)existing|already|found|detected|main\\.bicep|azure\\.yaml|\\bbicep\\b|infra/"
      # Must NOT overwrite existing IaC (Jest HARD: overwroteIaC === false)
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(create|create_file|write_file)$"
              args:
                path: "(?i)main\\.bicep|main\\.tf"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Test 5: generated IaC meets the security baseline (node-express-server-rest-api) ──
  # Jest reads generated .bicep/.tf + scaffold-manifest.json and HARD-asserts: publishing-cred
  # policies present · TLS version set · NO deterministic secrets · NO blanket firewall ·
  # validationResult populated · selfReview populated.
  # earlyTerminate = shouldEarlyTerminateOnScaffoldManifest (halts after the manifest write, so
  # the manifest + validationResult + selfReview + IaC files all exist for the file graders).
  - name: "Scaffold - IaC Security Baseline"
    prompt: "I built a side project and want to get it live on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: scaffold
      debug: scaffold-security-baseline
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-result","toolPattern":"create|create_file|write_file|edit","argsPattern":"scaffold-manifest"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"(?i)azd\\s+(up|provision)|az\\s+deployment|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/rwieruch/node-express-server-rest-api
        - git fetch -q --depth 1 origin master
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 160
    graders:
      # routing gate (Jest HARD: isSkillInvoked === true)
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # Publishing-credential policies present (Jest HARD: basicPublishingCredentialsPolicies)
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "(?i)basicPublishingCredentialsPolicies"
      # TLS version explicitly set (Jest HARD: minimum_tls_version / minTlsVersion)
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "(?i)minTlsVersion|minimumTlsVersion|min_tls_version|minimum_tls_version"
      # NO deterministic secrets (Jest HARD: hasDeterministicSecrets === false)
      - type: file-not-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "(?i)change-me|change\\.me\\.in\\.production|uniquestring.*secret|uniquestring.*password"
      # NO blanket firewall rule (Jest HARD: hasBlanketFirewall === false)
      - type: file-not-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "(?i)allowAllWindowsAzureIps"
      # scaffold-manifest.json written (canonical scaffold-completion signal)
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
      # validationResult populated — azure-validate ran (Jest HARD: manifest.validationResult non-null)
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
          pattern: '"validationResult"\s*:\s*\{'
      # selfReview populated (Jest HARD: assertScaffoldSelfReviewPopulated)
      - type: file-matches
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
          pattern: '"selfReview"\s*:\s*\{'
      # No azd (Jest assertNoAzdCommands — afterEach)
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)\\bazd\\s+\\w+"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
