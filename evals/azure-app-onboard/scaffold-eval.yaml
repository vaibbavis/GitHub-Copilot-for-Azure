# ── scaffold/*.test.ts — scaffold-phase eval (5 integration cases) ──
# New format (see seeded-deploy-eval.yaml + integration-fast-track-vaibs.yaml): file/output/
# tool-call graders. earlyTerminate mirrors the Jest shouldEarlyTerminate* helpers — halts at
# the first IaC write / scaffold-manifest write / azd decision gate, BEFORE any real deploy
# (these are cost: llm+execute, NOT cost: azure). A deploy-command condition is always OR'd in
# as a safety net so the agent can never reach a live `az deployment` / `azd up` / `terraform
# apply`.
#
# NOT ported: assertScaffoldSubagentsDispatched / assertNoSubagentFailures — the custom executor
# omits subagent.* lifecycle events, so sub-agent dispatch is not gradeable. scaffold-manifest.json
# + its validationResult/selfReview + the generated IaC files stand in as scaffold-completion proof
# (these read the real workspace filesystem and are robust to event handling).
#   integration.test.ts (1: Bicep gen) · integration-existing-iac.test.ts (3: existing IaC) ·
#   integration-security.test.ts (1: IaC security baseline)

  # ── Test 1: scaffold generates Bicep for a simple app (broken-todo-demo) ──
  # Jest: softCheckSkill · IaC content present · secure defaults · no deploy w/o approval.
  # Runs to scaffold completion (earlyTerminate on the scaffold-manifest write, like the Security
  # Baseline) so the background iac-gen subagent finishes flushing infra/*.bicep to disk before
  # grading — then we assert the on-disk IaC + manifest. (Terminating on the first .bicep write
  # raced the async subagent flush and left nothing on disk.)
  - name: "Scaffold - Bicep Generation Simple App"
    prompt: "I built a side project and want to get it live on Azure"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: scaffold
      debug: scaffold-bicep-gen
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"tool-call-result","toolPattern":"create|create_file|write_file|edit","argsPattern":"scaffold-manifest"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"(?i)azd\\s+(up|provision)|az\\s+deployment|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Arun07AK/broken-todo-demo
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 160
    graders:
      # routing gate — azure-app-onboard MUST be invoked (Jest softCheckSkill)
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # IaC content surfaced (Jest: main.bicep / bicep / infra/ in output)
      - type: output-matches
        config:
          pattern: "(?i)main\\.bicep|\\bbicep\\b|infra/"
      # Secure defaults mentioned (Jest: managed identity / RBAC / Key Vault / least privilege)
      - type: output-matches
        config:
          pattern: "(?i)managed identity|managed-identity|key vault|keyvault|rbac|least privilege"
      # On-disk IaC actually generated — the run completes scaffold (scaffold-manifest
      # earlyTerminate), so the iac-gen subagent's writes are flushed before grading.
      - type: file-exists
        config:
          path: "**/infra/**/*.bicep"
      - type: file-exists
        config:
          path: "**/.copilot-azure/sessions/**/scaffold-manifest.json"
      # generated Bicep has real content (a resource/module declaration), not an empty stub
      - type: file-matches
        config:
          path: "**/infra/**/*.bicep"
          pattern: "(?im)^\\s*(resource|module)\\s"
      # No deploy without approval (Jest hasDeployCmd — soft there; here a hard safety gate)
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision|deploy)\\b"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)az\\s+deployment\\s+(sub|group)\\s+create\\b"
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)terraform\\s+apply\\b"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Test 2: existing azd + Foundry (get-started-with-ai-agents) — detect, don't overwrite ──
  # Jest: skillInvoked HARD · assertAzdDecisionGatePresented · detectsAI HARD · overwroteIaC=false HARD.
  # earlyTerminate = shouldEarlyTerminateOnAzdDecisionGate (halts at the existing-IaC decision gate).
  - name: "Scaffold - Existing Azd Foundry Detect No Overwrite"
    prompt: "I have an existing app — what's the best way to migrate it to Azure?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: scaffold
      debug: scaffold-existing-foundry
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"assistant-message-match","contentPattern":"(?i)(?=[\\s\\S]*(azure\\.yaml|azd))(?=[\\s\\S]*(existing|found|detected))(?=[\\s\\S]*(deploy using|start fresh|use existing|create new|option|choice))"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"(?i)azd\\s+(up|provision)|az\\s+deployment|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/get-started-with-ai-agents
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 80
    graders:
      # routing gate (Jest HARD: isSkillInvoked === true)
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # AI / Foundry framework detected (Jest HARD: detectsAI)
      - type: output-matches
        config:
          pattern: "(?i)openai|\\bai\\b|foundry|agent"
      # Existing IaC acknowledged (Jest assertAzdDecisionGatePresented)
      - type: output-matches
        config:
          pattern: "(?i)existing|found|detected|azure\\.yaml|azd"
      # Must NOT overwrite existing IaC (Jest HARD: overwroteIaC === false — isIaCFileWrite)
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(create|create_file|write_file)$"
              args:
                path: "(?i)main\\.bicep|main\\.tf"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Test 3: canonical azd template (todo-nodejs-mongo) — detect Cosmos/Mongo, don't overwrite ──
  # Jest: skillInvoked HARD · assertAzdDecisionGatePresented · assertDatabaseDetected(mongodb) ·
  #       overwroteIaC=false HARD.
  - name: "Scaffold - Existing Azd Template Mongo Detect No Overwrite"
    prompt: "I just signed up for Azure. What's the fastest way to bring my app over?"
    tags:
      type: integration
      tier: full
      cost: llm+execute
      area: scaffold
      debug: scaffold-existing-mongo
      skill: azure-app-onboard
      followUp:
        - "Just go with defaults using my current subscription."
        - "Before we decide anything, walk me through every service and database you detected."
        - "Which Azure database will my data layer use?"
        - "Yes."
        - "Yes."
      earlyTerminate: '[{"type":"assistant-message-match","contentPattern":"(?i)cosmos|mongo"},{"type":"tool-call-match","toolPattern":"bash|powershell","argsPattern":"(?i)azd\\s+(up|provision)|az\\s+deployment|terraform\\s+apply"}]'
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/todo-nodejs-mongo
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    constraints:
      max_turns: 120
    graders:
      # routing gate (Jest HARD: isSkillInvoked === true)
      - type: skill-invocation
        config:
          required: ["azure-app-onboard"]
      # DB detection (B1): followUps push the agent PAST the decision gate to enumerate services,
      # and earlyTerminate stops once it names the DB — so it must map MongoDB → Cosmos in output.
      - type: output-matches
        config:
          pattern: "(?i)cosmos|mongo"
      # Existing IaC acknowledged (Jest assertAzdDecisionGatePresented)
      - type: output-matches
        config:
          pattern: "(?i)existing|found|detected|azure\\.yaml|azd"
      # Must NOT overwrite existing IaC (Jest HARD: overwroteIaC === false)
      - type: tool-calls
        config:
          disallowed:
            - name: "(?i)^(create|create_file|write_file)$"
              args:
                path: "(?i)main\\.bicep|main\\.tf"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

