# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-kubernetes/integration.test.ts
# Migration: Jest → Vally
#
# Global graders (evaluate#125 workaround): no_runtime_failure
# is duplicated into every stimulus block below.

name: azure-kubernetes-integration-eval
description: |
  Integration evaluation for azure-kubernetes skill
tags:
  type: integration
  skill: azure-kubernetes

config:
  runs: 5
  timeout: "10m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── routing-aks-creation-prompt ──
  # Jest: "invokes azure-kubernetes skill for AKS cluster creation prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Routing: production-ready AKS cluster creation"
    prompt: "Help me create a production-ready AKS cluster with best practices"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-kubernetes"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── routing-pod-rightsizing-prompt ──
  # Jest: "invokes azure-kubernetes skill for pod rightsizing prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Routing: pod rightsizing"
    prompt: "My AKS pods are over-provisioned, how do I rightsize them?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-kubernetes"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── routing-cluster-autoscaler-prompt ──
  # Jest: "invokes azure-kubernetes skill for cluster autoscaler prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Routing: enable Cluster Autoscaler"
    prompt: "How do I enable and configure Cluster Autoscaler on my AKS cluster?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-kubernetes"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── routing-cas-profile-tuning-prompt ──
  # Jest: "invokes azure-kubernetes skill for CAS profile tuning prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Routing: CAS aggressive scale-down tuning"
    prompt: "CAS is enabled but idle nodes persist due to conservative profile settings, tune it for more aggressive scale-down"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-kubernetes"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── routing-spot-node-pool-prompt ──
  # Jest: "invokes azure-kubernetes skill for spot node pool prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Routing: add Spot VM node pool"
    prompt: "How do I add a Spot VM node pool to my AKS cluster?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-kubernetes"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── routing-vpa-setup-prompt ──
  # Jest: "invokes azure-kubernetes skill for VPA setup prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Routing: enable Vertical Pod Autoscaler"
    prompt: "How do I enable Vertical Pod Autoscaler on AKS to get rightsizing recommendations?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-kubernetes"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── day0-guidance-output-prompt ──
  # Jest: "responds with Day-0 vs Day-1 guidance"
  # Expects response mentioning tier, networking, or API server
  - name: "Output: Day-0 AKS decisions"
    prompt: "What Day-0 decisions do I need to make for AKS?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)tier|networking|API server"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── aks-sku-recommendation-output-prompt ──
  # Jest: "recommends AKS Automatic vs Standard appropriately"
  # Expects response mentioning Automatic or Standard SKU
  - name: "Output: AKS Automatic vs Standard recommendation"
    prompt: "Should I use AKS Automatic or Standard for my production workload?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)Automatic|Standard"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── networking-cni-output-prompt ──
  # Jest: "provides networking recommendations"
  # Expects response mentioning CNI, overlay, or VNet
  - name: "Output: AKS networking with VNet-routable IPs"
    prompt: "How should I configure AKS networking for pods that need VNet-routable IPs?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)CNI|overlay|VNet"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── security-best-practices-output-prompt ──
  # Jest: "covers security best practices"
  # Expects response mentioning identity, Entra, workload, or Key Vault
  - name: "Output: AKS security best practices"
    prompt: "What security best practices should I follow for AKS?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)identity|Entra|workload|Key Vault"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── pod-rightsizing-output-prompt ──
  # Jest: "response mentions resource requests and limits for pod rightsizing prompt"
  # Expects response mentioning kubectl top, VPA, or resource requests
  - name: "Output: pod rightsizing with kubectl or VPA"
    prompt: "My AKS pods are over-provisioned, how do I rightsize them?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)kubectl top|VPA|resource requests"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── cluster-autoscaler-output-prompt ──
  # Jest: "response mentions autoscaler commands for cluster autoscaler prompt"
  # Expects response mentioning enable-cluster-autoscaler, min-count, or scale-down
  - name: "Output: Cluster Autoscaler configuration commands"
    prompt: "How do I enable and configure Cluster Autoscaler on my AKS cluster?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)enable-cluster-autoscaler|min-count|scale-down"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── cas-profile-tuning-output-prompt ──
  # Jest: "response mentions autoscaler profile parameters for CAS tuning prompt"
  # Expects response mentioning scale-down-unneeded-time, utilization-threshold,
  # cluster-autoscaler-profile, or scale-down-delay
  - name: "Output: CAS profile parameters for aggressive scale-down"
    prompt: "CAS is enabled but idle nodes persist due to conservative profile settings, tune it for more aggressive scale-down"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)scale-down-unneeded-time|utilization-threshold|cluster-autoscaler-profile|scale-down-delay"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── spot-node-pool-output-prompt ──
  # Jest: "response mentions spot priority and eviction for spot node pool prompt"
  # Expects response mentioning Spot, eviction-policy, or scalesetpriority
  - name: "Output: Spot VM node pool with eviction policy"
    prompt: "How do I add a Spot VM node pool to my AKS cluster?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)Spot|eviction-policy|scalesetpriority"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── vpa-setup-output-prompt ──
  # Jest: "response mentions VPA and recommendation mode for VPA setup prompt"
  # Expects response mentioning VerticalPodAutoscaler, updateMode, or VPA
  - name: "Output: VPA setup with recommendation mode"
    prompt: "How do I enable Vertical Pod Autoscaler on AKS to get rightsizing recommendations?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)VerticalPodAutoscaler|updateMode|VPA"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ────────────────────────────────────────────────────────────────────────────
  # azure-kubernetes-automatic-readiness stimuli
  # Source: tests/azure-kubernetes/azure-kubernetes-automatic-readiness/integration.test.ts
  # ────────────────────────────────────────────────────────────────────────────

  # ── fix-guidance-output-prompt ──
  # Jest: "offers fix guidance for incompatible workloads"
  # Expects response mentioning fix, remediation, Deployment Safeguards, or incompatible
  - name: "Output: fix guidance for incompatible workloads"
    prompt: "What would break if I switch my AKS Standard cluster to AKS Automatic?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)fix|remediat|Deployment Safeguards|incompatible"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── deployment-safeguards-output-prompt ──
  # Jest: "covers Deployment Safeguards policies"
  # Expects response mentioning Safeguards, policy, resource requests, or probes
  - name: "Output: Deployment Safeguards policies coverage"
    prompt: "What AKS Automatic policies will deny my deployments?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: output
    graders:
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)Safeguards|policy|resource requests|probes"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ────────────────────────────────────────────────────────────────────────────
  # Fixture-based: AKS Automatic readiness tests (require workspace manifests)
  # Re-added per PR #2472 review:
  # https://github.com/microsoft/GitHub-Copilot-for-Azure/pull/2472#issuecomment-4596446181
  # ────────────────────────────────────────────────────────────────────────────

  # ── fixture-manifest-validation ──
  # Jest: "validates manifests against AKS Automatic constraints"
  # Expects response identifying hostNetwork, NET_ADMIN, missing resources/probes
  - name: "Fixture: validate manifests against AKS Automatic constraints"
    prompt: "I have a deployment.yaml in my workspace. Validate my Kubernetes manifests against AKS Automatic constraints and tell me what violations exist."
    environment:
      files:
        - src: fixture/deployment.yaml
          dest: deployment.yaml
    tags:
      type: integration
      tier: full
      cost: llm
      area: workspace-fixture
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)hostNetwork|NET_ADMIN|resource requests|resource limits|probes|Deployment Safeguards|incompatible|violation|capability"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── fixture-migration-compatibility ──
  # Jest: "checks AKS Automatic migration compatibility for workloads"
  # Expects response mentioning compatibility, migration readiness, or tolerations
  - name: "Fixture: AKS Automatic migration compatibility check"
    prompt: "I have a workloads.yaml in my workspace. Can I migrate my AKS cluster to AKS Automatic? Check if my workloads are compatible."
    environment:
      files:
        - src: fixture/workloads.yaml
          dest: workloads.yaml
    tags:
      type: integration
      tier: full
      cost: llm
      area: workspace-fixture
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: completed
      - type: output-matches
        config:
          pattern: "(?i)compatible|migration|readiness|AKS Automatic|toleration|workload|resource"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
