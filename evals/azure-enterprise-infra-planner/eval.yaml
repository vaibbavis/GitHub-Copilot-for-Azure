# Vally eval config — migrated from Waza and Jest integration tests
# Waza source: tests/azure-enterprise-infra-planner/evals/eval.yaml + tasks/*.yaml
# Jest source: tests/azure-enterprise-infra-planner/{integration,triggers}.test.ts
# Migration: Waza → Vally; Jest → Vally
#
# Global graders (evaluate#125 workaround): has_output, no_runtime_failure,
# and security_posture are duplicated into every Waza-migrated stimulus block.
# Jest-migrated routing stimuli additionally carry no_runtime_failure to match the
# repo-wide routing convention; the remaining Jest-migrated stimuli omit the global
# graders — the original Jest tests did not assert on runtime failure or security posture.
#
# Global efficiency constraint (max_tool_calls: 50) → constraints.max_turns: 50.

name: azure-enterprise-infra-planner-eval
description: |
  Evaluation suite for the azure-enterprise-infra-planner skill — covers
  workload planning (GenAI, AKS, Container Apps, 3-tier, serverless, data
  pipeline, ML, IoT, backup/DR), routing accuracy, plan JSON structure,
  Bicep generation under infra/, and security posture.

tags:
  type: integration
  skill: azure-enterprise-infra-planner

defaults:
  runs: 1
  timeout: "10m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8
  weights:
    completed: 0.1
    file-exists: 0.1
    file-matches: 0.1
    file-not-exists: 0.1
    output-contains: 0.1
    output-matches: 0.1
    output-not-matches: 0.1
    json-object-rules: 0.1
    skill-invocation: 0.2

stimuli:
  # ── invoke-simple-plan ──
  # Waza source: tasks/invoke-simple-plan.yaml
  # Basic plan invocation — simple network topology (VNet + subnets + NSG + Bastion)
  - name: "Invoke Simple Plan"
    prompt: "Plan a simple Azure network with one VNet, two subnets, an NSG, and a Bastion host for secure VM access. Assume all defaults to create the preliminary resource list, then approve the preliminary list and proceed to plan generation."
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
    constraints:
      max_turns: 50
    graders:
      # Task grader: skill_invoked (skill_invocation → completed in Vally;
      # skill targeting is implicit in the eval config)
      # Task grader: plan_generated (file must_exist)
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|crashed|unhandled exception|panic:"
      # Global: security_posture
      - type: output-not-matches
        config:
          pattern: "(?i)connection.?string.*=.*Account(Key|Name)="
      - type: output-not-matches
        config:
          pattern: "(?i)SharedAccessKey="
      - type: output-not-matches
        config:
          pattern: "(?i)masterKey="
      # Skill invocation grader (P1-3)
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]

  # ── plan-aks-microservices ──
  # Waza source: tasks/plan-aks-microservices.yaml
  # E-commerce platform migration to AKS — 5 microservices
  - name: "Plan AKS Microservices"
    prompt: "We're migrating our e-commerce platform to Azure. It consists of 5 microservices: product catalog, order management, user authentication, payment processing, and notifications. We want to deploy on AKS with proper networking, monitoring, and a managed database. Plan the Azure infrastructure for this system. Assume all defaults to create the preliminary resource list, then approve the preliminary list and proceed to plan generation."
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
    constraints:
      max_turns: 50
    graders:
      # Task: expected.output_contains
      - type: output-contains
        config:
          substring: "aks"
      - type: output-contains
        config:
          substring: "database"
      - type: output-contains
        config:
          substring: "monitor"
      # Task grader: identifies_compute_resources
      - type: output-matches
        config:
          pattern: "(?i)aks|kubernetes|managed.?cluster"
      # Task grader: identifies_networking
      - type: output-matches
        config:
          pattern: "(?i)vnet|subnet|network|load.?balancer|ingress"
      # Task grader: plan_created
      - type: output-matches
        config:
          pattern: "(?i)plan|infrastructure|resource"
      # Task grader: generates_infra_artifacts (file-exists + file-matches)
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: "(?i)managedcluster|kubernetes|containerservice"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|crashed|unhandled exception|panic:"
      # Global: security_posture
      - type: output-not-matches
        config:
          pattern: "(?i)connection.?string.*=.*Account(Key|Name)="
      - type: output-not-matches
        config:
          pattern: "(?i)SharedAccessKey="
      - type: output-not-matches
        config:
          pattern: "(?i)masterKey="
      # Skill invocation grader (P1-3)
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]

  # ── plan-backup-dr-001 ──
  # Waza source: tasks/plan-backup-dr.yaml
  # Disaster recovery with cross-region failover
  - name: "Backup/DR - Site Recovery Cross-Region"
    prompt: |
      Configure a site recovery plan for disaster failover from East to West Azure region, replicate major VM workloads, and automate DNS failbacks. Assume all defaults to create the preliminary resource list, then approve the preliminary list and proceed to plan generation.
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
    constraints:
      max_turns: 50
    graders:
      # Task: expected.output_contains
      - type: output-contains
        config:
          substring: "site recovery"
      - type: output-contains
        config:
          substring: "failover"
      - type: output-contains
        config:
          substring: "region"
      # Task grader: identifies_site_recovery
      - type: output-matches
        config:
          pattern: "(?i)site.?recovery|disaster.?recovery|dr|failover|replicate"
      # Task grader: identifies_cross_region
      - type: output-matches
        config:
          pattern: "(?i)region|east|west|geo|cross.?region|failback"
      # Task grader: identifies_vm_workloads
      - type: output-matches
        config:
          pattern: "(?i)vm|virtual.?machine|workload|replicate"
      # Task grader: plan_created
      - type: output-matches
        config:
          pattern: "(?i)plan|infrastructure|resource"
      # Task grader: generates_infra_artifacts (file-exists + file-matches)
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: "(?i)recovery|replicate|failover"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|crashed|unhandled exception|panic:"
      # Global: security_posture
      - type: output-not-matches
        config:
          pattern: "(?i)connection.?string.*=.*Account(Key|Name)="
      - type: output-not-matches
        config:
          pattern: "(?i)SharedAccessKey="
      - type: output-not-matches
        config:
          pattern: "(?i)masterKey="
      # Skill invocation grader (P1-3)
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]

  # ── plan-container-apps-network-001 ──
  # Adapted from flagged Container Apps REST API → VNet-integrated ACA network topology
  - name: "VNet-Integrated Container Apps"
    prompt: |
      I need to design the network for a stateless REST API on Azure Container Apps that auto-scales on HTTP requests and persists user uploads to Blob Storage — it should sit inside a VNet with private endpoints and no public exposure. Can you plan the network infrastructure for this? Assume all defaults to create the preliminary resource list, then approve the preliminary list and proceed to plan generation.
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
    constraints:
      max_turns: 50
    graders:
      - type: output-contains
        config:
          substring: "container"
      - type: output-contains
        config:
          substring: "scale"
      - type: output-contains
        config:
          substring: "blob"
      - type: output-matches
        config:
          pattern: "(?i)container.?app|aca|container"
      - type: output-matches
        config:
          pattern: "(?i)scale|auto.?scale|http.?request|replica"
      - type: output-matches
        config:
          pattern: "(?i)blob|storage|upload|persist"
      # Task grader: identifies_network_isolation (PR reword: VNet + private endpoints)
      - type: output-matches
        config:
          pattern: "(?i)private.?endpoint|private.?link|vnet|virtual.?network"
      - type: output-matches
        config:
          pattern: "(?i)plan|infrastructure|resource"
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: "(?i)container.?app"
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|crashed|unhandled exception|panic:"
      - type: output-not-matches
        config:
          pattern: "(?i)connection.?string.*=.*Account(Key|Name)="
      - type: output-not-matches
        config:
          pattern: "(?i)SharedAccessKey="
      - type: output-not-matches
        config:
          pattern: "(?i)masterKey="
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]

  # ── plan-genai-chatbot-isolated-001 ──
  # Adapted from flagged GenAI Chatbot → network-isolated GPT-4 backend topology
  - name: "Network-Isolated GenAI Chatbot"
    prompt: |
      I need to design the network isolation for a GPT-4 customer support chatbot — it should reach Azure OpenAI through a private endpoint, expose its REST API frontend behind Application Gateway, and connect to the conversation database with no public access. Can you plan the network infrastructure for this? Assume all defaults to create the preliminary resource list, then approve the preliminary list and proceed to plan generation.
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
    constraints:
      max_turns: 50
    graders:
      # Task grader: skill_invoked (skill_invocation → completed; implicit)
      # Global: has_output
      - type: completed
      # Network isolation check (PR reword: private endpoint + App Gateway)
      - type: output-matches
        config:
          pattern: "(?i)private.?endpoint|private.?link|application.?gateway|app.?gateway"
      # Plan artifact generated (prompt proceeds to plan generation)
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      # Network isolation reflected in the generated plan
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: "(?i)privateendpoint|privatelink|applicationgateway"
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|crashed|unhandled exception|panic:"
      # Global: security_posture
      - type: output-not-matches
        config:
          pattern: "(?i)connection.?string.*=.*Account(Key|Name)="
      - type: output-not-matches
        config:
          pattern: "(?i)SharedAccessKey="
      - type: output-not-matches
        config:
          pattern: "(?i)masterKey="
      # Skill invocation grader (P1-3)
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]

  # ── plan-three-tier-terraform-001 ──
  # Waza source: tasks/plan-three-tier-terraform.yaml
  # Segmented VNet with Linux VMs + Terraform IaC (followUp drives Phase 6 Terraform
  # generation; file-exists infra/main.tf asserts the Terraform output named in the test).
  - name: "Segmented VNet - Linux VMs + Terraform"
    prompt: |
      Spin up Linux VMs across a segmented VNet — separate web, app, and data subnets with NSGs between them and an internal load balancer — automate patch management via Azure Automation, and log inter-subnet traffic for compliance. Assume all defaults to create the preliminary resource list, then approve the preliminary list and proceed to plan generation.
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
      followUp:
        - "The resource list looks good, proceed with generating the plan."
        - "Approve the plan as-is."
        - "Yes, generate the Terraform IaC for the approved plan."
    constraints:
      max_turns: 80
    graders:
      # Task: expected.output_contains
      - type: output-contains
        config:
          substring: "vm"
      - type: output-contains
        config:
          substring: "subnet"
      - type: output-contains
        config:
          substring: "automation"
      # Task grader: identifies_compute_resources
      - type: output-matches
        config:
          pattern: "(?i)vm|virtual.?machine|linux"
      # Task grader: identifies_networking
      - type: output-matches
        config:
          pattern: "(?i)subnet|vnet|network|traffic|compliance"
      # Task grader: identifies_automation
      - type: output-matches
        config:
          pattern: "(?i)automat|patch|update.?management"
      # Task grader: plan_created
      - type: output-matches
        config:
          pattern: "(?i)plan|infrastructure|resource"
      # Task grader: generates_infra_artifacts (file-exists + file-matches)
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: "(?i)virtual.?machine|vm"
      # Terraform IaC generated (validates the "Terraform" in the test name)
      - type: file-exists
        config:
          path: "**/infra/main.tf"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|crashed|unhandled exception|panic:"
      # Global: security_posture
      - type: output-not-matches
        config:
          pattern: "(?i)connection.?string.*=.*Account(Key|Name)="
      - type: output-not-matches
        config:
          pattern: "(?i)SharedAccessKey="
      - type: output-not-matches
        config:
          pattern: "(?i)masterKey="
      # Skill invocation grader (P1-3)
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]

  # ── trigger-geo-redundant-sql-backup ──
  # Jest: triggers.test.ts → "Should Trigger" (geo-redundant SQL backup prompt)
  # Assertions: skill-invocation (mirrors `matcher.shouldTrigger(...).triggered === true`)
  - name: "Trigger - Geo-Redundant SQL Backup DR"
    prompt: "Set up geo-redundant disaster recovery for on-premises SQL servers across paired Azure regions, with cross-region replication, a failover network, encryption-at-rest, and automated monthly DR tests."
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      skill: azure-enterprise-infra-planner
      earlyTerminate: '[{"type":"skill-call","skill":"azure-enterprise-infra-planner"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── trigger-vmware-asr-runbooks ──
  # Jest: triggers.test.ts → "Should Trigger" (VMware ASR runbooks prompt)
  # Assertions: skill-invocation. tier:full keeps the smoke suite to 1 stimulus per skill.
  - name: "Trigger - VMware ASR Runbooks"
    prompt: "Deploy a cross-region failover setup for on-premises VMware VMs — Azure Site Recovery replication into a recovery VNet, orchestrated runbooks for failover, and compliance audit trails."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-enterprise-infra-planner
      earlyTerminate: '[{"type":"skill-call","skill":"azure-enterprise-infra-planner"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── skill-3tier-hardened-os ──
  # Jest: integration.test.ts → "invokes skill for hardened 3-tier VM infrastructure prompt"
  # Assertions: skill-invocation (invocation rate ≥ 80%, early-terminates on skill-call)
  - name: "Skill - 3-Tier Hardened OS Images"
    prompt: "Deploy 3-tier architecture with hardened OS images, VM backups scheduled daily, and application-level redundancy for the business logic tier."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-enterprise-infra-planner
      earlyTerminate: '[{"type":"skill-call","skill":"azure-enterprise-infra-planner"},{"type":"tool-call-count","count":3}]'
      followUp:
        - "The resource list looks good, proceed with generating the plan."
        - "Go with recommended options. Assume all defaults to make the plan."
    constraints:
      max_turns: 50
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── skill-vmss-appgw-waf ──
  # Jest: integration.test.ts → "invokes skill for VMSS with WAF and encryption prompt"
  # Assertions: skill-invocation (invocation rate ≥ 80%, early-terminates on skill-call)
  - name: "Skill - VMSS + App Gateway WAF"
    prompt: "Deploy three distinct VM scale sets for a legacy app, route incoming HTTP/S via Application Gateway with WAF, and encrypt all data disks."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-enterprise-infra-planner
      earlyTerminate: '[{"type":"skill-call","skill":"azure-enterprise-infra-planner"},{"type":"tool-call-count","count":3}]'
      followUp:
        - "The resource list looks good, proceed with generating the plan."
        - "Go with recommended options. Assume all defaults to make the plan."
    constraints:
      max_turns: 50
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── skill-azure-backup-ltr ──
  # Jest: integration.test.ts → "invokes skill for backup and compliance prompt"
  # Assertions: skill-invocation (invocation rate ≥ 80%, early-terminates on skill-call)
  - name: "Skill - Azure Backup Long-Term Retention"
    prompt: "Set up Azure Backup for critical VM workloads, create a long-term retention policy for compliance, and test backup restores quarterly."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-enterprise-infra-planner
      earlyTerminate: '[{"type":"skill-call","skill":"azure-enterprise-infra-planner"},{"type":"tool-call-count","count":3}]'
      followUp:
        - "The resource list looks good, proceed with generating the plan."
        - "Go with recommended options. Assume all defaults to make the plan."
    constraints:
      max_turns: 50
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── skill-secure-multi-region-3tier-windows ──
  # Jest: integration.test.ts → "invokes skill for secure multi-region 3-tier prompt"
  # Assertions: skill-invocation (invocation rate ≥ 80%, early-terminates on skill-call)
  - name: "Skill - Secure Multi-Region 3-Tier Windows"
    prompt: "Set up a secure multi-region 3-tier stack with Windows VMs for web and app layers, scale out the web tier with Azure Load Balancer, attach Premium Managed Disks to database tier."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-enterprise-infra-planner
      earlyTerminate: '[{"type":"skill-call","skill":"azure-enterprise-infra-planner"},{"type":"tool-call-count","count":3}]'
      followUp:
        - "The resource list looks good, proceed with generating the plan."
        - "Go with recommended options. Assume all defaults to make the plan."
    constraints:
      max_turns: 50
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── skill-ml-scoring-endpoint-isolation ──
  # Net-new: the removed app-centric ML Inference workload (Azure ML scoring endpoint),
  # rephrased to be infra-led so it routes to infra-planner instead of azure-prepare.
  # Asserts infra-planner still triggers for the ML infra/networking slice.
  - name: "Skill - Network-Isolated ML Scoring Endpoint"
    prompt: "Design a network-isolated ML model scoring endpoint on Azure — an Azure ML online endpoint that loads its model from the registry, deployed inside a VNet with private endpoints, dedicated subnets, and NSGs blocking all public internet access, with prediction logs sent to Azure Monitor."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-enterprise-infra-planner
      earlyTerminate: '[{"type":"skill-call","skill":"azure-enterprise-infra-planner"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── response-jumpbox-nsgs-internal-lb ──
  # Jest: integration.test.ts → response-quality "generates infrastructure-plan.json with expected resources"
  # Assertions: skill-invocation + file-exists(.azure/insights.json, infrastructure-plan.json) + JSON schema markers
  #   + networking+compute resource types in plan + no IaC files generated (Bicep/Terraform/tfvars).
  #   followUp 2 explicitly halts the agent at the Phase 6 IaC Gate
  #   (see plugin/skills/azure-enterprise-infra-planner/references/phases/6-generate-iac.md).
  - name: "Response - Jumpbox + NSGs + Internal LB (plan only)"
    prompt: "Provision a jumpbox VM for secure management, establish NSGs for each tier, and connect tiers using internal Azure Load Balancer. Assume all defaults to make the plan."
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
      followUp:
        - "The resource list looks good, proceed with generating the plan."
        - "Approve the plan as-is. Do not generate any IaC."
    constraints:
      max_turns: 50
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # File paths use `**/...` globs because the agent non-deterministically
      # writes plan files either at workspace root or in a skill-named subdir.
      - type: file-exists
        config:
          path: "**/.azure/insights.json"
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      # Plan-level required fields (Jest: expect(plan.meta|inputs|plan).toHaveProperty)
      - type: json-object-rules
        config:
          path: "**/.azure/infrastructure-plan.json"
          rules:
            - type: has-property
              key: meta.planId
            - type: has-property
              key: meta.status
            - type: has-property
              key: meta.version
            - type: has-property
              key: inputs.userGoal
            - type: has-property
              key: inputs.insightsApplied
            - type: has-property
              key: plan.resources
            - type: has-property
              key: plan.overallReasoning
            - type: has-property
              key: plan.validation
      # Per-resource required fields (Jest: for (const resource of plan.plan.resources) ...)
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"name"'
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"type"'
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"location"'
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"reasoning"'
      # hasNetworking + hasCompute (Jest: resourceTypes.some(...))
      - type: file-matches
        config:
